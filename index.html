<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Tracker</title>

  <style>
    :root {
      --bg: #04080b;
      --panel: rgba(7, 16, 20, 0.92);
      --text: #f1fbff;
      --muted: rgba(220, 240, 255, 0.64);
      --track: rgba(180, 230, 255, 0.12);

      --mana-color: #3fa6ff;
      --stamina-color: #39d7a0;
      --sync-color: #87ecff;

      --font-main: Calibri, Arial, Helvetica, sans-serif;

      --ring-card-height: 205px;
      --ring-gap: 14px;
      --status-core-height: calc((var(--ring-card-height) * 3) + (var(--ring-gap) * 2));
    }

    * {
      box-sizing: border-box;
    }

    @property --sweep-angle {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(120, 220, 255, 0.08), transparent 32%),
        radial-gradient(circle at 80% 100%, rgba(120, 220, 255, 0.05), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      padding: 22px;
      overflow-x: hidden;
    }

    .interface {
      position: relative;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 22px;
      border: 1px solid rgba(180, 230, 255, 0.22);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.035), transparent 35%),
        var(--panel);
      box-shadow:
        0 0 20px rgba(143, 232, 255, 0.10),
        inset 0 0 30px rgba(143, 232, 255, 0.05);
      overflow: hidden;
    }

    .interface::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.08;
      pointer-events: none;
    }

    .interface::after {
      content: "";
      position: absolute;
      top: -60%;
      left: -15%;
      width: 40%;
      height: 220%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.07),
        transparent
      );
      transform: rotate(18deg);
      animation: panelSweep 8s linear infinite;
      pointer-events: none;
    }

    .title {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(235, 248, 255, 0.92);
      text-shadow: 0 0 10px rgba(143, 232, 255, 0.45);
      font-size: 14px;
    }

    .character-info {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      padding: 14px 16px;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow:
        inset 0 0 18px rgba(143, 232, 255, 0.04),
        0 0 10px rgba(143, 232, 255, 0.05);
    }

    .character-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .character-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #characterName {
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1;
      color: var(--text);
      text-shadow:
        0 0 7px rgba(143, 232, 255, 0.45),
        0 0 16px rgba(143, 232, 255, 0.18);
    }

    .character-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .meta-pill {
      padding: 7px 11px;
      border: 1px solid rgba(180, 230, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 13px;
      text-shadow: 0 0 6px rgba(143, 232, 255, 0.18);
    }

    .api-status-pill {
      opacity: 0.72;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .api-status-pill.online {
      border-color: rgba(120, 255, 210, 0.28);
      color: rgba(190, 255, 230, 0.92);
    }

    .api-status-pill.offline {
      border-color: rgba(255, 177, 107, 0.28);
      color: rgba(255, 214, 170, 0.92);
    }

    .status-core {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
      margin-bottom: 20px;
      align-items: start;
    }

    .rings {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--ring-gap);
  align-content: start;
  align-self: start;
}

    .ring-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
      min-height: var(--ring-card-height);
      padding: 14px 10px 16px;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 18px rgba(143, 232, 255, 0.03);
      text-align: center;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .ring-card:hover {
      transform: translateY(-2px);
      border-color: rgba(220, 240, 255, 0.34);
      background: rgba(255, 255, 255, 0.045);
      box-shadow:
        0 0 14px rgba(143, 232, 255, 0.10),
        inset 0 0 18px rgba(255, 255, 255, 0.04);
    }

    .ring-label {
      margin-bottom: 10px;
      font-size: 18px;
      color: var(--text);
      text-shadow: 0 0 8px var(--ring-color);
    }

    .ring {
      position: relative;
      width: clamp(96px, 11vw, 126px);
      aspect-ratio: 1;
      margin: 2px auto 0;
      border-radius: 50%;
      background:
        conic-gradient(
          from -90deg,
          var(--ring-color) var(--angle),
          var(--track) 0deg
        );
      box-shadow:
        0 0 14px rgba(255, 255, 255, 0.04),
        inset 0 0 14px rgba(255, 255, 255, 0.05);
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        from var(--sweep-angle),
        transparent 0deg,
        transparent 214deg,
        rgba(255, 255, 255, 0.04) 232deg,
        rgba(255, 255, 255, 0.22) 246deg,
        rgba(255, 255, 255, 0.88) 258deg,
        rgba(255, 255, 255, 0.34) 270deg,
        rgba(255, 255, 255, 0.08) 288deg,
        transparent 310deg,
        transparent 360deg
      );
      -webkit-mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );
      mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
      opacity: 0.7;
      filter:
        blur(0.6px)
        drop-shadow(0 0 5px var(--ring-color));
      mix-blend-mode: screen;
      animation:
        ringSweep var(--sweep-speed, 4.8s) linear infinite,
        ringPulse var(--pulse-speed, 2.9s) ease-in-out infinite;
      animation-delay:
        var(--sweep-delay, 0s),
        var(--pulse-delay, 0s);
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(143, 232, 255, 0.06), transparent 62%),
        rgba(4, 10, 13, 0.98);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.06),
        0 0 10px rgba(0, 0, 0, 0.6);
    }

    .ring-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-shadow: 0 0 10px var(--ring-color);
    }

    .ring-value {
      font-size: clamp(15px, 3.2vw, 23px);
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
    }

    .ring-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.1;
      text-align: center;
    }

    .body-status {
  min-height: var(--status-core-height);
  border: 1px solid rgba(180, 230, 255, 0.16);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.02);
  padding: 16px;
  box-shadow:
    inset 0 0 18px rgba(143, 232, 255, 0.03),
    0 0 10px rgba(143, 232, 255, 0.05);
}

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 16px;
      text-shadow: 0 0 8px rgba(143, 232, 255, 0.25);
    }

    .body-layout {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 230px;
      gap: 18px;
      align-items: start;
    }

    .body-map-wrap {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 550px;
  padding: 14px 12px;
  border: 1px solid rgba(180, 230, 255, 0.10);
  border-radius: 18px;
  background:
    radial-gradient(circle at 50% 38%, rgba(80, 235, 255, 0.08), transparent 34%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.018), rgba(255, 255, 255, 0));
  overflow: hidden;
}

    .body-map-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0 28px,
          rgba(255,255,255,0.018) 28px 29px
        ),
        repeating-linear-gradient(
          to right,
          transparent 0 28px,
          rgba(255,255,255,0.012) 28px 29px
        );
      opacity: 0.18;
      pointer-events: none;
    }

    .body-map-wrap::after {
      content: "";
      position: absolute;
      left: 7%;
      right: 7%;
      top: -10%;
      height: 14%;
      background: linear-gradient(
        180deg,
        transparent,
        rgba(120, 245, 255, 0.22),
        transparent
      );
      filter: blur(10px);
      opacity: 0.75;
      animation: scanSweep 5.2s ease-in-out infinite;
      pointer-events: none;
    }

    .scan-dna {
      position: absolute;
      left: 34px;
      top: 108px;
      width: 54px;
      height: 250px;
      z-index: 1;
      opacity: 0.16;
      pointer-events: none;
      filter:
        drop-shadow(0 0 8px rgba(130, 245, 255, 0.14))
        blur(0.05px);
      animation: dnaFloat 9s ease-in-out infinite;
    }

    .scan-dna svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .dna-strand {
      fill: none;
      stroke: rgba(130, 245, 255, 0.38);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-dasharray: 18 12;
      animation: dnaFlow 9.5s linear infinite;
    }

    .dna-strand.alt {
      opacity: 0.62;
      animation-delay: -4.7s;
    }

    .dna-rung {
      stroke: rgba(170, 255, 255, 0.24);
      stroke-width: 1.15;
      stroke-linecap: round;
      animation: dnaRungPulse 5.8s ease-in-out infinite;
    }

    .dna-node {
      fill: rgba(190, 255, 255, 0.46);
      filter: drop-shadow(0 0 4px rgba(130, 245, 255, 0.28));
      animation: dnaNodePulse 5.8s ease-in-out infinite;
    }

    .scan-data {
      position: absolute;
      right: 22px;
      bottom: 26px;
      z-index: 1;
      display: grid;
      gap: 6px;
      max-width: 190px;
      font-family: "Courier New", monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(210, 250, 255, 0.28);
      text-shadow: 0 0 7px rgba(120, 245, 255, 0.16);
      pointer-events: none;
      animation: dataFlicker 4.8s ease-in-out infinite;
    }

    .scan-data span {
      white-space: nowrap;
    }

    @keyframes dnaFlow {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -30;
      }
    }

@keyframes dnaFloat {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.12;
      }

      50% {
        transform: translateY(8px);
        opacity: 0.20;
      }
    }

@keyframes dnaRungPulse {
      0%, 100% {
        opacity: 0.16;
      }

      50% {
        opacity: 0.38;
      }
    }

@keyframes dnaNodePulse {
      0%, 100% {
        opacity: 0.22;
      }

      50% {
        opacity: 0.56;
      }
    }

@keyframes dataFlicker {
      0%, 100% {
        opacity: 0.18;
      }

      35% {
        opacity: 0.36;
      }

      38% {
        opacity: 0.14;
      }

      42% {
        opacity: 0.40;
      }

      70% {
        opacity: 0.26;
      }
    }

    .body-image-stage {
  position: relative;
  width: min(100%, 410px);
  aspect-ratio: 1024 / 1336;
  margin: 0 auto;
  z-index: 2;
  filter:
    drop-shadow(0 0 12px rgba(40, 245, 255, 0.12))
    drop-shadow(0 0 22px rgba(40, 245, 255, 0.06));
  animation: none;
}

    .body-image-stage::before {
      content: "";
      position: absolute;
      inset: 18% 20% 10% 20%;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(70, 240, 255, 0.10),
        transparent 68%
      );
      filter: blur(26px);
      z-index: 0;
      animation: corePulse 4.2s ease-in-out infinite;
      pointer-events: none;
    }

.body-image-stage::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 45%;
  width: 42%;
  aspect-ratio: 1;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(140, 245, 255, 0.18);
  border-radius: 50%;
  z-index: 3;
  pointer-events: none;
  box-shadow:
    0 0 12px rgba(140, 245, 255, 0.10),
    inset 0 0 14px rgba(140, 245, 255, 0.06);
  animation: scanPing 4.8s ease-in-out infinite;
}
    
    .body-base-image,
    .body-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .body-base-image {
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    .body-overlay {
      z-index: 2;
      overflow: visible;
    }

    .scan-frame {
  position: absolute;
  inset: 14px;
  z-index: 4;
  pointer-events: none;
  border: 1px solid rgba(225, 240, 255, 0.10);
  box-shadow:
    inset 0 0 18px rgba(143, 232, 255, 0.025),
    0 0 10px rgba(143, 232, 255, 0.025);
}

    .scan-frame::before,
    .scan-frame::after {
      content: "";
      position: absolute;
      width: 58px;
      height: 58px;
      border-color: rgba(225, 240, 255, 0.55);
      border-style: solid;
    }

    .scan-frame::before {
      left: 0;
      top: 0;
      border-width: 2px 0 0 2px;
    }

    .scan-frame::after {
      right: 0;
      bottom: 0;
      border-width: 0 2px 2px 0;
    }

    .body-zone {
      fill: transparent;
      stroke: transparent;
      stroke-width: 2;
      opacity: 0;
      transition:
        fill 0.25s ease,
        stroke 0.25s ease,
        filter 0.25s ease,
        opacity 0.25s ease;
      mix-blend-mode: screen;
    }

    .body-zone.active {
      opacity: 0.14;
    }

    @keyframes woundPulse {
      0%, 100% {
        opacity: 0.34;
        filter: drop-shadow(0 0 5px var(--injury-color));
      }

      50% {
        opacity: 0.56;
        filter: drop-shadow(0 0 14px var(--injury-color));
      }
    }

    .status-marker-layer {
      pointer-events: none;
    }

    .status-marker {
      --marker-color: rgba(190, 255, 255, 0.82);
    }

    .status-marker line {
      stroke: var(--marker-color);
      stroke-width: 1.8;
      stroke-linecap: round;
      opacity: 0.78;
      filter: drop-shadow(0 0 4px var(--marker-color));
    }

    .status-marker-dot {
      fill: rgba(220, 255, 255, 0.98);
      stroke: rgba(4, 10, 13, 0.92);
      stroke-width: 1.35;
      filter: drop-shadow(0 0 7px var(--marker-color));
    }

    .status-marker-pulse {
      fill: transparent;
      stroke: var(--marker-color);
      stroke-width: 1.4;
      opacity: 0.55;
      animation: markerPulse 2.4s ease-in-out infinite;
    }

    .status-marker-tag {
      fill: rgba(5, 13, 16, 0.96);
      stroke: var(--marker-color);
      stroke-width: 1.55;
      filter:
        drop-shadow(0 0 6px rgba(0, 0, 0, 0.76))
        drop-shadow(0 0 7px var(--marker-color));
    }

    .status-marker-text {
      fill: rgba(245, 255, 255, 0.98);
      font-family: "Courier New", monospace;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.045em;
    }

    .status-marker[data-type="bleeding"] {
      --marker-color: rgba(255, 120, 120, 0.86);
    }

    .status-marker[data-type="poisoned"] {
      --marker-color: rgba(120, 255, 120, 0.82);
    }

    .status-marker[data-type="burning"] {
      --marker-color: rgba(255, 177, 107, 0.86);
    }

    .status-marker[data-type="fractured"] {
      --marker-color: rgba(240, 240, 240, 0.76);
    }

    .status-marker[data-type="frostbite"] {
      --marker-color: rgba(143, 232, 255, 0.86);
    }

    .status-marker[data-type="necrosis"] {
      --marker-color: rgba(212, 255, 122, 0.82);
    }

    @keyframes markerPulse {
      0%, 100% {
        r: 7;
        opacity: 0.18;
      }

      50% {
        r: 15;
        opacity: 0.54;
      }
    }

    .condition-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-self: center;
    }

    .condition-title {
      font-size: 14px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .condition-grid {
      display: grid;
      gap: 10px;
    }

    .condition-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid rgba(180, 230, 255, 0.14);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .condition-chip.active {
      color: var(--text);
      border-color: rgba(220, 240, 255, 0.25);
      background: rgba(255, 255, 255, 0.055);
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.08),
        inset 0 0 10px rgba(255, 255, 255, 0.02);
    }

    .condition-icon {
      width: 42px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid rgba(220, 240, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      font-family: "Courier New", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(240, 248, 255, 0.72);
      flex-shrink: 0;
    }

    .condition-chip.active .condition-icon {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(220, 240, 255, 0.30);
      color: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.08),
        inset 0 0 8px rgba(255, 255, 255, 0.03);
    }

    .condition-chip.active[data-type="bleeding"] .condition-icon {
      color: #ff8a8a;
      border-color: rgba(255, 120, 120, 0.45);
    }

    .condition-chip.active[data-type="poisoned"] .condition-icon {
      color: #8dff8d;
      border-color: rgba(120, 255, 120, 0.45);
    }

    .condition-chip.active[data-type="burning"] .condition-icon {
      color: #ffb16b;
      border-color: rgba(255, 177, 107, 0.45);
    }

    .condition-chip.active[data-type="fractured"] .condition-icon {
      color: #efefef;
      border-color: rgba(235, 235, 235, 0.34);
    }

    .condition-chip.active[data-type="frostbite"] .condition-icon {
      color: #8fe8ff;
      border-color: rgba(143, 232, 255, 0.45);
    }

    .condition-chip.active[data-type="necrosis"] .condition-icon {
      color: #d4ff7a;
      border-color: rgba(212, 255, 122, 0.45);
    }

    .injury-legend {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 0 8px rgba(255,255,255,0.04);
    }

    .level-0 { background: rgba(180, 220, 255, 0.10); }
    .level-1 { background: #ffe066; }
    .level-2 { background: #ffb347; }
    .level-3 { background: #ff6b3d; }
    .level-4 { background: #d90429; }

    .attributes {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      overflow: hidden;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 16px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.025);
    }

    .attribute {
      display: block;
      padding: 11px 6px;
      text-align: center;
      border-right: 1px solid rgba(180, 230, 255, 0.12);
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .attribute:hover {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.03);
    }

    .attribute:last-child {
      border-right: none;
    }

    .attr-name {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .attr-value {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
    }

    .sync-section {
      position: relative;
      z-index: 2;
    }

    .sync-link {
      display: block;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      border-radius: 14px;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .sync-link:hover {
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.03);
    }

    .sync-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 18px;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
    }

    .sync-bar {
      position: relative;
      height: 13px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.65);
    }

    .sync-fill {
      position: relative;
      height: 100%;
      width: var(--sync);
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(143, 232, 255, 0.45),
        var(--sync-color),
        rgba(230, 248, 255, 0.92)
      );
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.18),
        0 0 18px rgba(143, 232, 255, 0.08);
      overflow: hidden;
    }

    .sync-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: -35%;
      width: 35%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.85),
        transparent
      );
      animation: barSweep 2.7s linear infinite;
    }

    .resonance-ticker {
      position: relative;
      margin-top: 9px;
      height: 22px;
      overflow: hidden;
      border: 1px solid rgba(180, 230, 255, 0.10);
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(143, 232, 255, 0.045), transparent 30%, rgba(143, 232, 255, 0.035)),
        rgba(255, 255, 255, 0.018);
      box-shadow:
        inset 0 0 10px rgba(0, 0, 0, 0.38),
        0 0 8px rgba(143, 232, 255, 0.035);
    }

    .resonance-ticker::before,
    .resonance-ticker::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 42px;
      z-index: 2;
      pointer-events: none;
    }

    .resonance-ticker::before {
      left: 0;
      background: linear-gradient(90deg, rgba(4, 8, 11, 0.95), transparent);
    }

    .resonance-ticker::after {
      right: 0;
      background: linear-gradient(270deg, rgba(4, 8, 11, 0.95), transparent);
    }

    .resonance-track {
      display: inline-flex;
      align-items: center;
      height: 100%;
      white-space: nowrap;
      will-change: transform;
      animation: resonanceTicker var(--resonance-speed, 28s) linear infinite;
    }

    .resonance-text {
      padding-right: 0;
      font-family: "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(220, 250, 255, 0.58);
      text-shadow:
        0 0 6px rgba(143, 232, 255, 0.22),
        0 0 12px rgba(143, 232, 255, 0.08);
    }

    .resonance-name {
      color: rgba(245, 255, 255, 0.78);
    }

    .resonance-value {
      color: rgba(170, 255, 230, 0.80);
    }

    @keyframes resonanceTicker {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-25%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .resonance-track {
        animation: none;
      }
    }

    @keyframes ringSweep {
      from { --sweep-angle: 0deg; }
      to { --sweep-angle: 360deg; }
    }

    @keyframes ringPulse {
      0%, 100% {
        opacity: 0.38;
        filter:
          blur(0.9px)
          drop-shadow(0 0 3px var(--ring-color));
      }

      42% {
        opacity: 0.85;
        filter:
          blur(0.35px)
          drop-shadow(0 0 9px var(--ring-color));
      }

      68% {
        opacity: 0.55;
      }
    }

    @keyframes barSweep {
      from { left: -35%; }
      to { left: 110%; }
    }

    @keyframes panelSweep {
      from { transform: translateX(-120%) rotate(18deg); }
      to { transform: translateX(320%) rotate(18deg); }
    }

    @keyframes scanSweep {
  0% {
    transform: translateY(0);
    opacity: 0;
  }
  12% {
    opacity: 0.35;
  }
  50% {
    transform: translateY(390px);
    opacity: 0.65;
  }
  100% {
    transform: translateY(650px);
    opacity: 0;
  }
}

    @keyframes bodyFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    @keyframes corePulse {
      0%, 100% {
        opacity: 0.34;
        transform: scale(0.98);
      }
      50% {
        opacity: 0.62;
        transform: scale(1.02);
      }
    }

@keyframes scanPing {
  0%, 100% {
    opacity: 0.12;
    transform: translate(-50%, -50%) scale(0.92);
  }

  45% {
    opacity: 0.32;
    transform: translate(-50%, -50%) scale(1.08);
  }

  70% {
    opacity: 0.08;
    transform: translate(-50%, -50%) scale(1.18);
  }
}
    
    @media (max-width: 900px) {
      .status-core {
        grid-template-columns: 1fr;
      }

      .body-layout {
        grid-template-columns: 1fr;
      }

      .condition-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 12px;
      }

      .interface {
        padding: 16px;
      }

      .character-info {
        align-items: flex-start;
        flex-direction: column;
      }

      .character-meta {
        justify-content: flex-start;
      }

      .attributes {
        grid-template-columns: repeat(3, 1fr);
      }

      .attribute:nth-child(3) {
        border-right: none;
      }

      .attribute:nth-child(-n + 3) {
        border-bottom: 1px solid rgba(180, 230, 255, 0.12);
      }

      .condition-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <script>
    const params = new URLSearchParams(window.location.search);

    /*
      Beispiele:
      ?head=4
      ?neck=3&bleeding=neck
      ?chest=3&blutung=brust
      ?leftForearm=2&frostbite=leftForearm
      ?rechterunterschenkel=4&blutung=rechterunterschenkel
      ?bleeding=all
      ?blutung=alle
      ?bleeding=screenleftupperarm,screenrightupperarm
    */


    const OVERLAY_SCALE_X = 1;
    const OVERLAY_SCALE_Y = 1;

    const ALL_ZONES = [
      "head", "neck", "chest", "abdomen", "pelvis",
      "leftUpperArm", "leftForearm", "leftHand",
      "rightUpperArm", "rightForearm", "rightHand",
      "leftThigh", "leftLowerLeg", "leftFoot",
      "rightThigh", "rightLowerLeg", "rightFoot"
    ];

    const links = {
      hp: "https://app.notion.com/p/HP-37e07d209dc08040ab7afe7e2c54058b?source=copy_link",
      mana: "https://app.notion.com/p/Mana-37e07d209dc080e6846ae49e4661d424?source=copy_link",
      stamina: "https://app.notion.com/p/Ausdauer-37e07d209dc08057b996dcdbeee66130?source=copy_link",
      sync: "https://app.notion.com/p/Synchronisation-37e07d209dc080f7a2ddf023359d8cf8?source=copy_link",

      str: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      dex: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      con: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      int: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      wis: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      cha: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link"
    };

    function getText(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") return value;
      }

      return fallback;
    }

    function getNumber(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          const parsed = Number(value.replace(",", "."));
          if (!Number.isNaN(parsed)) return parsed;
        }
      }

      return fallback;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function percent(current, max) {
      if (!max || max <= 0) return 0;
      return clamp((current / max) * 100, 0, 100);
    }

    function mixColor(colorA, colorB, amount) {
      const a = colorA.match(/\w\w/g).map(hex => parseInt(hex, 16));
      const b = colorB.match(/\w\w/g).map(hex => parseInt(hex, 16));

      const mixed = a.map((value, index) => {
        return Math.round(value + (b[index] - value) * amount);
      });

      return `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`;
    }

    function getHpColor(hpPercent) {
      const red = "cc2114";
      const yellow = "ffc229";
      const green = "14cc14";

      if (hpPercent <= 50) {
        return mixColor(red, yellow, hpPercent / 50);
      }

      return mixColor(yellow, green, (hpPercent - 50) / 50);
    }

    function getStaminaStage(value) {
      const stages = [
        { min: 0, label: "Zusammenbruch" },
        { min: 15, label: "Stark Erschöpft" },
        { min: 30, label: "Erschöpft" },
        { min: 55, label: "Leicht Erschöpft" },
        { min: 75, label: "Fit" },
        { min: 90, label: "Erholt" }
      ];

      let currentStage = stages[0];

      for (const stage of stages) {
        if (value >= stage.min) currentStage = stage;
      }

      return currentStage.label;
    }

    function getInjuryColor(level) {
      const injuryColors = {
        0: "rgba(180, 220, 255, 0.10)",
        1: "#ffe066",
        2: "#ffb347",
        3: "#ff6b3d",
        4: "#d90429"
      };

      return injuryColors[clamp(level, 0, 4)] || injuryColors[0];
    }

    function applyInjury(zoneId, level) {
      const el = document.getElementById(zoneId);
      if (!el) return;

      const clampedLevel = clamp(level, 0, 4);

      if (clampedLevel === 0) {
        el.classList.remove("active");
        el.style.removeProperty("--injury-color");
        el.style.fill = "transparent";
        el.style.stroke = "transparent";
        el.style.filter = "none";
        el.style.animation = "none";
        el.style.opacity = "0";
        return;
      }

      const color = getInjuryColor(clampedLevel);

      const pulseDurations = {
        1: "2.8s",
        2: "2.2s",
        3: "1.7s",
        4: "1.2s"
      };

      el.classList.add("active");
      el.style.setProperty("--injury-color", color);
      el.style.fill = color;
      el.style.stroke = "rgba(255, 248, 248, 0.92)";
      el.style.opacity = "0.42";
      el.style.filter = `drop-shadow(0 0 ${4 + clampedLevel * 2}px ${color})`;
      el.style.animation = `woundPulse ${pulseDurations[clampedLevel]} ease-in-out infinite`;
    }

    function expandZoneToken(zone) {
      const normalized = zone.trim().toLowerCase().replace(/[\s_-]+/g, "");

      if (
        normalized === "all" ||
        normalized === "alle" ||
        normalized === "*" ||
        normalized === "fullbody" ||
        normalized === "wholebody" ||
        normalized === "ganzerkörper" ||
        normalized === "ganzerkorper"
      ) {
        return ALL_ZONES;
      }

      const aliases = {
        head: ["head"],
        kopf: ["head"],

        neck: ["neck"],
        hals: ["neck"],
        nacken: ["neck"],
        throat: ["neck"],

        chest: ["chest"],
        brust: ["chest"],

        abdomen: ["abdomen"],
        belly: ["abdomen"],
        bauch: ["abdomen"],

        pelvis: ["pelvis"],
        becken: ["pelvis"],

        /*
          Anatomische Namen aus Sicht des Charakters:
          left* = linker Arm / linkes Bein des Charakters.
          Da die Figur frontal zu uns schaut, liegt left* im Bild rechts.
        */
        leftarm: ["leftUpperArm", "leftForearm"],
        larm: ["leftUpperArm", "leftForearm"],
        linkerarm: ["leftUpperArm", "leftForearm"],
        leftupperarm: ["leftUpperArm"],
        luparm: ["leftUpperArm"],
        linkeroberarm: ["leftUpperArm"],
        leftforearm: ["leftForearm"],
        lforearm: ["leftForearm"],
        linkerunterarm: ["leftForearm"],
        lefthand: ["leftHand"],
        lhand: ["leftHand"],
        linkehand: ["leftHand"],

        rightarm: ["rightUpperArm", "rightForearm"],
        rarm: ["rightUpperArm", "rightForearm"],
        rechterarm: ["rightUpperArm", "rightForearm"],
        rightupperarm: ["rightUpperArm"],
        ruparm: ["rightUpperArm"],
        rechteroberarm: ["rightUpperArm"],
        rightforearm: ["rightForearm"],
        rforearm: ["rightForearm"],
        rechterunterarm: ["rightForearm"],
        righthand: ["rightHand"],
        rhand: ["rightHand"],
        rechtehand: ["rightHand"],

        leftleg: ["leftThigh", "leftLowerLeg"],
        lleg: ["leftThigh", "leftLowerLeg"],
        linkesbein: ["leftThigh", "leftLowerLeg"],
        leftthigh: ["leftThigh"],
        lthigh: ["leftThigh"],
        linkeroberschenkel: ["leftThigh"],
        leftlowerleg: ["leftLowerLeg"],
        llowerleg: ["leftLowerLeg"],
        linkerunterschenkel: ["leftLowerLeg"],
        leftfoot: ["leftFoot"],
        lfoot: ["leftFoot"],
        linkerfuss: ["leftFoot"],
        linkerfuß: ["leftFoot"],

        rightleg: ["rightThigh", "rightLowerLeg"],
        rleg: ["rightThigh", "rightLowerLeg"],
        rechtesbein: ["rightThigh", "rightLowerLeg"],
        rightthigh: ["rightThigh"],
        rthigh: ["rightThigh"],
        rechteroberschenkel: ["rightThigh"],
        rightlowerleg: ["rightLowerLeg"],
        rlowerleg: ["rightLowerLeg"],
        rechterunterschenkel: ["rightLowerLeg"],
        rightfoot: ["rightFoot"],
        rfoot: ["rightFoot"],
        rechterfuss: ["rightFoot"],
        rechterfuß: ["rightFoot"],

        /*
          Bildschirm-Aliase:
          screenleft* = links im Bild.
          screenright* = rechts im Bild.
        */
        screenleftarm: ["rightUpperArm", "rightForearm"],
        screenleftupperarm: ["rightUpperArm"],
        screenleftforearm: ["rightForearm"],
        screenlefthand: ["rightHand"],
        screenleftleg: ["rightThigh", "rightLowerLeg"],
        screenleftthigh: ["rightThigh"],
        screenleftlowerleg: ["rightLowerLeg"],
        screenleftfoot: ["rightFoot"],

        screenrightarm: ["leftUpperArm", "leftForearm"],
        screenrightupperarm: ["leftUpperArm"],
        screenrightforearm: ["leftForearm"],
        screenrighthand: ["leftHand"],
        screenrightleg: ["leftThigh", "leftLowerLeg"],
        screenrightthigh: ["leftThigh"],
        screenrightlowerleg: ["leftLowerLeg"],
        screenrightfoot: ["leftFoot"]
      };

      return aliases[normalized] || [];
    }

    function getConditionInput(names) {
      const raw = getText(names, "");
      if (!raw) return { active: false, zones: [] };

      const normalized = raw.trim().toLowerCase();

      if (["1", "true", "yes", "ja", "on", "active"].includes(normalized)) {
        return { active: true, zones: [] };
      }

      if (["0", "false", "no", "nein", "off", "inactive"].includes(normalized)) {
        return { active: false, zones: [] };
      }

      const zones = raw
        .split(/[;,|]/)
        .flatMap(part => part.split(","))
        .flatMap(part => expandZoneToken(part))
        .filter(Boolean);

      return {
        active: zones.length > 0,
        zones: [...new Set(zones)]
      };
    }

    function getMarkerCenter(zoneKey) {
      /*
        Marker-Anker sind manuell gesetzt, damit sie nicht aus langen Polygonen
        in ungünstige Mittelpunkte rutschen.
      */
      const anchors = {
        head: { x: 512, y: 88 },
        neck: { x: 512, y: 206 },
        chest: { x: 512, y: 302 },
        abdomen: { x: 512, y: 452 },
        pelvis: { x: 512, y: 600 },

        rightUpperArm: { x: 350, y: 350 },
        rightForearm: { x: 282, y: 540 },
        rightHand: { x: 248, y: 705 },

        leftUpperArm: { x: 674, y: 350 },
        leftForearm: { x: 742, y: 540 },
        leftHand: { x: 776, y: 705 },

        rightThigh: { x: 430, y: 780 },
        rightLowerLeg: { x: 400, y: 1060 },
        rightFoot: { x: 380, y: 1290 },

        leftThigh: { x: 594, y: 780 },
        leftLowerLeg: { x: 624, y: 1060 },
        leftFoot: { x: 644, y: 1290 }
      };

      if (anchors[zoneKey]) return anchors[zoneKey];

      const zone = document.getElementById(`zone-${zoneKey}`);
      if (!zone) return null;

      const box = zone.getBBox();

      return {
        x: box.x + box.width / 2,
        y: box.y + box.height / 2
      };
    }

    function getMarkerOffset(zoneKey) {
      const offsets = {
        head: { dx: 92, dy: -26 },
        neck: { dx: 104, dy: -12 },
        chest: { dx: 112, dy: -18 },
        abdomen: { dx: 120, dy: 0 },
        pelvis: { dx: 112, dy: 26 },

        rightUpperArm: { dx: -128, dy: -24 },
        rightForearm: { dx: -118, dy: 4 },
        rightHand: { dx: -94, dy: 0 },

        leftUpperArm: { dx: 128, dy: -24 },
        leftForearm: { dx: 118, dy: 4 },
        leftHand: { dx: 94, dy: 0 },

        rightThigh: { dx: -112, dy: 8 },
        rightLowerLeg: { dx: -106, dy: 16 },
        rightFoot: { dx: -88, dy: -16 },

        leftThigh: { dx: 112, dy: 8 },
        leftLowerLeg: { dx: 106, dy: 16 },
        leftFoot: { dx: 88, dy: -16 }
      };

      return offsets[zoneKey] || { dx: 100, dy: 0 };
    }

    const markerStackCounter = {};

    function addStatusMarker(zoneKey, code, type) {
      const center = getMarkerCenter(zoneKey);
      if (!center) return;

      const { dx, dy } = getMarkerOffset(zoneKey);

      const stackKey = `${zoneKey}:${Math.sign(dx) || 1}`;
      const stackIndex = markerStackCounter[stackKey] || 0;
      markerStackCounter[stackKey] = stackIndex + 1;

      const stackShift = stackIndex * 34;
      const verticalDirection = dy < -8 ? -1 : 1;

      const tx = center.x + dx;
      const ty = center.y + dy + stackShift * verticalDirection;

      const layer = document.getElementById("statusMarkers");

      const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
      group.setAttribute("class", "status-marker");
      group.setAttribute("data-type", type);

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", center.x);
      line.setAttribute("y1", center.y);
      line.setAttribute("x2", tx);
      line.setAttribute("y2", ty);

      const pulse = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      pulse.setAttribute("class", "status-marker-pulse");
      pulse.setAttribute("cx", center.x);
      pulse.setAttribute("cy", center.y);
      pulse.setAttribute("r", "7");

      const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      dot.setAttribute("class", "status-marker-dot");
      dot.setAttribute("cx", center.x);
      dot.setAttribute("cy", center.y);
      dot.setAttribute("r", "5.2");

      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("class", "status-marker-tag");
      rect.setAttribute("x", tx - 34);
      rect.setAttribute("y", ty - 16);
      rect.setAttribute("width", "68");
      rect.setAttribute("height", "32");
      rect.setAttribute("rx", "8");

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("class", "status-marker-text");
      text.setAttribute("x", tx);
      text.setAttribute("y", ty + 6.5);
      text.setAttribute("text-anchor", "middle");
      text.textContent = code;

      group.appendChild(line);
      group.appendChild(pulse);
      group.appendChild(dot);
      group.appendChild(rect);
      group.appendChild(text);

      layer.appendChild(group);
    }

    const legacyLeftArm = getNumber(["rightarm", "rarm"], 0);
    const legacyRightArm = getNumber(["leftarm", "larm"], 0);
    const legacyLeftLeg = getNumber(["rightleg", "rleg"], 0);
    const legacyRightLeg = getNumber(["leftleg", "lleg"], 0);

    function getUrlStats() {
      return {
      name: getText("name", "Ryo"),
      level: getText("level", "???"),
      species: getText(["species", "spezies"], "Mensch (nicht bestätigt)"),

      hp: getNumber("hp", 34),
      hpMax: getNumber(["hpmax", "hpMax"], 34),

      mana: getNumber("mana", 0),
      manaMax: getNumber(["manamax", "manaMax"], 0),

      stamina: getNumber(["ausdauer", "stamina"], 100),
      sync: getNumber(["sync", "synchronisation"], 20),

      resonances: [
        { name: getText(["res1name", "r1name"], "Bollwerk"), value: getNumber(["bollwerk", "res1", "r1"], 50) },
        { name: getText(["res2name", "r2name"], "Wächterherz"), value: getNumber(["waechterherz", "wächterherz", "res2", "r2"], 100) },
        { name: getText(["res3name", "r3name"], "Der Suchende"), value: getNumber(["dersuchende", "suchende", "res3", "r3"], 5) },
        { name: getText(["res4name", "r4name"], "Drachenblut"), value: getNumber(["drachenblut", "res4", "r4"], 0) }
      ],

      str: getNumber("str", 13),
      dex: getNumber("dex", 14),
      con: getNumber("con", 12),
      int: getNumber("int", 15),
      wis: getNumber("wis", 14),
      cha: getNumber("cha", 12),

      injuries: {
        head: getNumber(["head", "kopf"], 0),
        neck: getNumber(["neck", "hals", "nacken", "throat"], 0),
        chest: getNumber(["chest", "brust"], 0),
        abdomen: getNumber(["abdomen", "belly", "bauch"], 0),
        pelvis: getNumber(["pelvis", "becken"], 0),

        leftUpperArm: getNumber(["leftUpperArm", "leftupperarm", "luparm"], legacyLeftArm),
        leftForearm: getNumber(["leftForearm", "leftforearm", "lforearm"], legacyLeftArm),
        leftHand: getNumber(["leftHand", "lefthand", "lhand"], 0),

        rightUpperArm: getNumber(["rightUpperArm", "rightupperarm", "ruparm"], legacyRightArm),
        rightForearm: getNumber(["rightForearm", "rightforearm", "rforearm"], legacyRightArm),
        rightHand: getNumber(["rightHand", "righthand", "rhand"], 0),

        leftThigh: getNumber(["leftThigh", "leftthigh", "lthigh"], legacyLeftLeg),
        leftLowerLeg: getNumber(["leftLowerLeg", "leftlowerleg", "llowerleg"], legacyLeftLeg),
        leftFoot: getNumber(["leftFoot", "leftfoot", "lfoot"], 0),

        rightThigh: getNumber(["rightThigh", "rightthigh", "rthigh"], legacyRightLeg),
        rightLowerLeg: getNumber(["rightLowerLeg", "rightlowerleg", "rlowerleg"], legacyRightLeg),
        rightFoot: getNumber(["rightFoot", "rightfoot", "rfoot"], 0)
      },

      conditions: {
        bleeding: getConditionInput(["bleeding", "blutung"]),
        poisoned: getConditionInput(["poisoned", "vergiftet", "toxin"]),
        burning: getConditionInput(["burning", "verbrannt", "brand"]),
        fractured: getConditionInput(["fractured", "bruch", "fraktur"]),
        frostbite: getConditionInput(["frostbite", "frost", "erfrierung", "erfroren"]),
        necrosis: getConditionInput(["necrosis", "nekrose", "verderbnis"])
      }
    };
    }

    

    const DEFAULT_API_URL = "https://ryo-status-api.ryodra26.workers.dev/status";

    function normalizeConditionFromApi(input) {
      if (!input) {
        return { active: false, zones: [] };
      }

      const rawZones = Array.isArray(input)
        ? input
        : String(input).split(/[;,|]/).flatMap(part => part.split(","));

      const zones = rawZones
        .flatMap(zone => expandZoneToken(String(zone)))
        .filter(Boolean);

      return {
        active: zones.length > 0,
        zones: [...new Set(zones)]
      };
    }

    function normalizeApiStatus(apiStatus, fallback) {
      const apiAttributes = apiStatus.attributes || {};
      const apiInjuries = apiStatus.injuries || {};
      const apiConditions = apiStatus.conditions || {};

      return {
        ...fallback,

        name: apiStatus.name ?? fallback.name,
        level: apiStatus.level ?? fallback.level,
        species: apiStatus.species ?? fallback.species,

        hp: Number(apiStatus.hp ?? fallback.hp),
        hpMax: Number(apiStatus.hpMax ?? fallback.hpMax),
        mana: Number(apiStatus.mana ?? fallback.mana),
        manaMax: Number(apiStatus.manaMax ?? fallback.manaMax),
        stamina: Number(apiStatus.stamina ?? fallback.stamina),
        sync: Number(apiStatus.sync ?? fallback.sync),

        str: Number(apiAttributes.str ?? fallback.str),
        dex: Number(apiAttributes.dex ?? fallback.dex),
        con: Number(apiAttributes.con ?? fallback.con),
        int: Number(apiAttributes.int ?? fallback.int),
        wis: Number(apiAttributes.wis ?? fallback.wis),
        cha: Number(apiAttributes.cha ?? fallback.cha),

        injuries: {
          ...fallback.injuries,
          ...Object.fromEntries(
            Object.entries(apiInjuries).map(([key, value]) => [key, Number(value) || 0])
          )
        },

        conditions: {
          bleeding: normalizeConditionFromApi(apiConditions.bleeding),
          poisoned: normalizeConditionFromApi(apiConditions.poisoned),
          burning: normalizeConditionFromApi(apiConditions.burning),
          fractured: normalizeConditionFromApi(apiConditions.fractured),
          frostbite: normalizeConditionFromApi(apiConditions.frostbite),
          necrosis: normalizeConditionFromApi(apiConditions.necrosis)
        },

        resonances: Array.isArray(apiStatus.resonances) && apiStatus.resonances.length > 0
          ? apiStatus.resonances.map(item => ({
              name: item.name || "",
              value: Number(item.value) || 0
            }))
          : fallback.resonances
      };
    }

    function setApiStatus(mode, message) {
      const el = document.getElementById("apiStatus");
      if (!el) return;

      el.classList.remove("online", "offline");
      el.classList.add(mode === "online" ? "online" : "offline");
      el.textContent = message;
    }

function renderTracker(stats) {
      document.getElementById("rings").innerHTML = "";
      document.getElementById("attributes").innerHTML = "";
      document.getElementById("conditionGrid").innerHTML = "";
      document.getElementById("statusMarkers").innerHTML = "";

    document.getElementById("characterName").textContent = stats.name;
    document.getElementById("characterLevel").textContent = stats.level;
    document.getElementById("characterSpecies").textContent = stats.species;
    document.getElementById("syncLink").href = links.sync;

    const hpPercent = percent(stats.hp, stats.hpMax);
    const manaPercent = percent(stats.mana, stats.manaMax);
    const staminaPercent = clamp(stats.stamina, 0, 100);
    const syncPercent = clamp(stats.sync, 0, 100);

    const rings = [
      {
        label: "HP",
        valueText: `${stats.hp}/${stats.hpMax}`,
        subText: `${Math.round(hpPercent)}%`,
        percent: hpPercent,
        color: getHpColor(hpPercent),
        link: links.hp,
        speed: 4.4,
        delay: -0.6,
        pulseDelay: -0.2
      },
      {
        label: "Mana",
        valueText: stats.manaMax > 0 ? `${stats.mana}/${stats.manaMax}` : "—",
        subText: stats.manaMax > 0 ? `${Math.round(manaPercent)}%` : "Nicht erwacht",
        percent: manaPercent,
        color: "var(--mana-color)",
        link: links.mana,
        speed: 5.2,
        delay: -1.8,
        pulseDelay: -1.1
      },
      {
        label: "Ausdauer",
        valueText: getStaminaStage(staminaPercent),
        subText: `${Math.round(staminaPercent)}%`,
        percent: staminaPercent,
        color: "var(--stamina-color)",
        link: links.stamina,
        speed: 4.8,
        delay: -2.6,
        pulseDelay: -0.7
      }
    ];

    const attributes = [
      { name: "STR", value: stats.str, link: links.str },
      { name: "DEX", value: stats.dex, link: links.dex },
      { name: "CON", value: stats.con, link: links.con },
      { name: "INT", value: stats.int, link: links.int },
      { name: "WIS", value: stats.wis, link: links.wis },
      { name: "CHA", value: stats.cha, link: links.cha }
    ];

    const conditionConfig = [
      { key: "bleeding",  label: "Blutung",     code: "BLD" },
      { key: "poisoned",  label: "Vergiftung",  code: "TOX" },
      { key: "burning",   label: "Verbrennung", code: "BRN" },
      { key: "fractured", label: "Fraktur",     code: "FRX" },
      { key: "frostbite", label: "Erfrierung",  code: "FRS" },
      { key: "necrosis",  label: "Nekrose",     code: "NEC" }
    ];

    const ringsContainer = document.getElementById("rings");

    rings.forEach(ring => {
      const card = document.createElement("a");
      card.href = ring.link;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.className = "ring-card";
      card.style.setProperty("--ring-color", ring.color);
      card.style.setProperty("--angle", `${ring.percent * 3.6}deg`);
      card.style.setProperty("--sweep-speed", `${ring.speed}s`);
      card.style.setProperty("--sweep-delay", `${ring.delay}s`);
      card.style.setProperty("--pulse-delay", `${ring.pulseDelay}s`);

      card.innerHTML = `
        <div class="ring-label">${ring.label}</div>
        <div class="ring">
          <div class="ring-content">
            <div class="ring-value">${ring.valueText}</div>
            <div class="ring-sub">${ring.subText}</div>
          </div>
        </div>
      `;

      ringsContainer.appendChild(card);
    });

    const attributesContainer = document.getElementById("attributes");

    attributes.forEach(attribute => {
      const cell = document.createElement("a");
      cell.href = attribute.link;
      cell.target = "_blank";
      cell.rel = "noopener noreferrer";
      cell.className = "attribute";

      cell.innerHTML = `
        <div class="attr-name">${attribute.name}</div>
        <div class="attr-value">${attribute.value}</div>
      `;

      attributesContainer.appendChild(cell);
    });

    const conditionGrid = document.getElementById("conditionGrid");

    conditionConfig.forEach(condition => {
      const chip = document.createElement("div");
      const state = stats.conditions[condition.key] || { active: false, zones: [] };
      const active = state.active;

      chip.className = `condition-chip${active ? " active" : ""}`;
      chip.dataset.type = condition.key;
      chip.innerHTML = `
        <span class="condition-icon">${condition.code}</span>
        <span>${condition.label}</span>
      `;

      // Wichtig: Alle Status-Chips werden immer angezeigt.
      conditionGrid.appendChild(chip);

      // Marker erscheinen nur, wenn konkrete Zonen angegeben sind,
      // z.B. ?bleeding=chest oder ?bleeding=all.
      if (active && state.zones.length > 0) {
        state.zones.forEach(zoneKey => {
          addStatusMarker(zoneKey, condition.code, condition.key);
        });
      }
    });

    const activeConditionCount = Object.values(stats.conditions)
      .filter(condition => condition.active).length;

    document.getElementById("bodyStatusLabel").textContent =
      activeConditionCount > 0
        ? `${activeConditionCount} Status aktiv`
        : "Stabil";

    Object.entries(stats.injuries).forEach(([zoneKey, level]) => {
      applyInjury(`zone-${zoneKey}`, level);
    });

    function renderResonanceTicker() {
      const track = document.getElementById("resonanceTrack");
      if (!track) return;

      const items = stats.resonances
        .filter(item => item.name && item.name.trim() !== "")
        .map(item => {
          const value = clamp(item.value, 0, 100);
          return `<span class="resonance-name">${item.name}</span>: <span class="resonance-value">${Math.round(value)}%</span>`;
        });

      const text = items.length > 0
        ? `${items.join(" <span aria-hidden=\"true\">|</span> ")} <span aria-hidden=\"true\">|</span>&nbsp;`
        : `<span class="resonance-name">Keine Resonanzdaten</span> <span aria-hidden="true">|</span>&nbsp;`;

      track.innerHTML = `
        <span class="resonance-text">${text}</span>
        <span class="resonance-text" aria-hidden="true">${text}</span>
        <span class="resonance-text" aria-hidden="true">${text}</span>
        <span class="resonance-text" aria-hidden="true">${text}</span>
      `;

      const speed = Math.max(20, items.join("").length * 0.7);
      track.style.setProperty("--resonance-speed", `${speed}s`);
    }

    document.getElementById("syncText").textContent = `${Math.round(syncPercent)}%`;
    document.getElementById("syncFill").style.setProperty("--sync", `${syncPercent}%`);
    renderResonanceTicker();
    }

    async function initTracker() {
      const urlStats = getUrlStats();
      let finalStats = urlStats;

      const apiUrl = getText(["api", "apiUrl"], DEFAULT_API_URL);
      const apiDisabled = ["0", "false", "off", "aus", "none"].includes(String(apiUrl).toLowerCase());

      if (!apiDisabled) {
        try {
          setApiStatus("offline", "Lädt…");

          const response = await fetch(apiUrl, {
            cache: "no-store"
          });

          if (!response.ok) {
            throw new Error(`API ${response.status}`);
          }

          const apiStatus = await response.json();
          finalStats = normalizeApiStatus(apiStatus, urlStats);
          setApiStatus("online", "Notion");
        } catch (error) {
          console.warn("Notion/Worker Status konnte nicht geladen werden. URL-Werte werden benutzt.", error);
          setApiStatus("offline", "URL");
        }
      } else {
        setApiStatus("offline", "URL");
      }

      renderTracker(finalStats);
    }

    initTracker();
</script>
</body>
</html>
