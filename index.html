<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Tracker</title>

  <style>
    :root {
      --bg: #04080b;
      --panel: rgba(7, 16, 20, 0.92);
      --text: #f1fbff;
      --muted: rgba(220, 240, 255, 0.64);
      --track: rgba(180, 230, 255, 0.12);

      --mana-color: #3fa6ff;
      --stamina-color: #39d7a0;
      --sync-color: #87ecff;

      --font-main: Calibri, Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    @property --sweep-angle {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(120, 220, 255, 0.08), transparent 32%),
        radial-gradient(circle at 80% 100%, rgba(120, 220, 255, 0.05), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      padding: 22px;
      overflow-x: hidden;
    }

    .interface {
      position: relative;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px;
      border: 1px solid rgba(180, 230, 255, 0.22);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.035), transparent 35%),
        var(--panel);
      box-shadow:
        0 0 20px rgba(143, 232, 255, 0.10),
        inset 0 0 30px rgba(143, 232, 255, 0.05);
      overflow: hidden;
    }

    .interface::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.08;
      pointer-events: none;
    }

    .interface::after {
      content: "";
      position: absolute;
      top: -60%;
      left: -15%;
      width: 40%;
      height: 220%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.07),
        transparent
      );
      transform: rotate(18deg);
      animation: panelSweep 8s linear infinite;
      pointer-events: none;
    }

    .title {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(235, 248, 255, 0.92);
      text-shadow: 0 0 10px rgba(143, 232, 255, 0.45);
      font-size: 14px;
    }

    .character-info {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      padding: 14px 16px;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow:
        inset 0 0 18px rgba(143, 232, 255, 0.04),
        0 0 10px rgba(143, 232, 255, 0.05);
    }

    .character-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .character-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #characterName {
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1;
      color: var(--text);
      text-shadow:
        0 0 7px rgba(143, 232, 255, 0.45),
        0 0 16px rgba(143, 232, 255, 0.18);
    }

    .character-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .meta-pill {
      padding: 7px 11px;
      border: 1px solid rgba(180, 230, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 13px;
      text-shadow: 0 0 6px rgba(143, 232, 255, 0.18);
    }

    .status-core {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .rings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .ring-card {
      display: block;
      min-width: 0;
      padding: 14px 10px 12px;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 18px rgba(143, 232, 255, 0.03);
      text-align: center;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .ring-card:hover {
      transform: translateY(-2px);
      border-color: rgba(220, 240, 255, 0.34);
      background: rgba(255, 255, 255, 0.045);
      box-shadow:
        0 0 14px rgba(143, 232, 255, 0.10),
        inset 0 0 18px rgba(255, 255, 255, 0.04);
    }

    .ring-label {
      margin-bottom: 10px;
      font-size: 17px;
      color: var(--text);
      text-shadow: 0 0 8px var(--ring-color);
    }

    .ring {
      position: relative;
      width: clamp(98px, 16vw, 136px);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      background:
        conic-gradient(
          from -90deg,
          var(--ring-color) var(--angle),
          var(--track) 0deg
        );
      box-shadow:
        0 0 14px rgba(255, 255, 255, 0.04),
        inset 0 0 14px rgba(255, 255, 255, 0.05);
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        from var(--sweep-angle),
        transparent 0deg,
        transparent 214deg,
        rgba(255, 255, 255, 0.04) 232deg,
        rgba(255, 255, 255, 0.22) 246deg,
        rgba(255, 255, 255, 0.88) 258deg,
        rgba(255, 255, 255, 0.34) 270deg,
        rgba(255, 255, 255, 0.08) 288deg,
        transparent 310deg,
        transparent 360deg
      );

      -webkit-mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );

      mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );

      -webkit-mask-composite: source-in;
      mask-composite: intersect;

      opacity: 0.7;
      filter:
        blur(0.6px)
        drop-shadow(0 0 5px var(--ring-color));

      mix-blend-mode: screen;

      animation:
        ringSweep var(--sweep-speed, 4.8s) linear infinite,
        ringPulse var(--pulse-speed, 2.9s) ease-in-out infinite;

      animation-delay:
        var(--sweep-delay, 0s),
        var(--pulse-delay, 0s);
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(143, 232, 255, 0.06), transparent 62%),
        rgba(4, 10, 13, 0.98);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.06),
        0 0 10px rgba(0, 0, 0, 0.6);
    }

    .ring-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-shadow: 0 0 10px var(--ring-color);
    }

    .ring-value {
      font-size: clamp(15px, 3.2vw, 23px);
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
    }

    .ring-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.1;
      text-align: center;
    }

    .body-status {
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
      box-shadow:
        inset 0 0 18px rgba(143, 232, 255, 0.03),
        0 0 10px rgba(143, 232, 255, 0.05);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 16px;
      text-shadow: 0 0 8px rgba(143, 232, 255, 0.25);
    }

    .body-layout {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 220px;
      gap: 18px;
      align-items: center;
    }

    .body-map-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 420px;
      padding: 8px 0;
    }

    .scan-map {
      width: min(100%, 370px);
      height: auto;
      filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.05));
    }

    .scan-ui .frame-line {
      stroke: rgba(225, 240, 255, 0.50);
      stroke-width: 2;
      fill: none;
    }

    .scan-ui .frame-line.faint,
    .scan-ui .frame-grid {
      stroke: rgba(225, 240, 255, 0.14);
      stroke-width: 1;
      fill: none;
    }

    .scan-box {
      fill: rgba(255, 255, 255, 0.04);
      stroke: rgba(225, 240, 255, 0.22);
      stroke-width: 1.1;
    }

    .scan-box.faint {
      fill: rgba(255, 255, 255, 0.02);
    }

    .scan-label {
      fill: rgba(245, 250, 255, 0.88);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.08em;
    }

    .scan-label.big {
      font-size: 24px;
      font-weight: 700;
    }

    .scan-label.small {
      font-size: 12px;
      font-weight: 700;
    }

    .scan-label.tiny {
      font-size: 8px;
    }

    .scan-cross line {
      stroke: rgba(255, 255, 255, 0.68);
      stroke-width: 1.35;
    }

    .body-glow {
  fill: none;
  stroke: rgba(40, 245, 255, 0.38);
  stroke-width: 7;
  filter: blur(3px) drop-shadow(0 0 14px rgba(40, 245, 255, 0.32));
  opacity: 0.55;
}

.body-silhouette {
  fill: rgba(40, 245, 255, 0.07);
  stroke: rgba(90, 250, 255, 0.92);
  stroke-width: 2.2;
  filter:
    drop-shadow(0 0 7px rgba(40, 245, 255, 0.35))
    drop-shadow(0 0 18px rgba(40, 245, 255, 0.10));
}

.body-inner-line {
  fill: none;
  stroke: rgba(210, 255, 255, 0.18);
  stroke-width: 1.1;
  stroke-linecap: round;
}

.body-zone {
  fill: transparent;
  stroke: transparent;
  stroke-width: 1.3;
  opacity: 0;
  transition:
    fill 0.25s ease,
    stroke 0.25s ease,
    filter 0.25s ease,
    opacity 0.25s ease;
}

.body-zone.active {
  opacity: 1;
}

.body-zone:hover {
  stroke: rgba(255, 255, 255, 0.92);
}

@keyframes woundPulse {
  0%, 100% {
    opacity: 0.68;
    filter: drop-shadow(0 0 6px var(--injury-color));
  }

  50% {
    opacity: 1;
    filter: drop-shadow(0 0 18px var(--injury-color));
  }
}

/* Statusmarker direkt am Körper */
.status-marker-layer {
  pointer-events: none;
}

.status-marker line {
  stroke: rgba(190, 255, 255, 0.7);
  stroke-width: 1.2;
}

.status-marker-dot {
  fill: rgba(190, 255, 255, 0.95);
  filter: drop-shadow(0 0 6px rgba(190, 255, 255, 0.7));
}

.status-marker-tag {
  fill: rgba(7, 16, 20, 0.92);
  stroke: rgba(120, 255, 255, 0.45);
  stroke-width: 1;
  rx: 8;
}

.status-marker-text {
  fill: rgba(240, 255, 255, 0.96);
  font-family: "Courier New", monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.status-marker[data-type="bleeding"] .status-marker-tag {
  stroke: rgba(255, 120, 120, 0.6);
}
.status-marker[data-type="poisoned"] .status-marker-tag {
  stroke: rgba(120, 255, 120, 0.6);
}
.status-marker[data-type="burning"] .status-marker-tag {
  stroke: rgba(255, 177, 107, 0.6);
}
.status-marker[data-type="fractured"] .status-marker-tag {
  stroke: rgba(240, 240, 240, 0.55);
}
.status-marker[data-type="frostbite"] .status-marker-tag {
  stroke: rgba(143, 232, 255, 0.65);
}
.status-marker[data-type="necrosis"] .status-marker-tag {
  stroke: rgba(212, 255, 122, 0.65);
}

    .condition-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .condition-title {
      font-size: 14px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .condition-grid {
      display: grid;
      gap: 10px;
    }

    .condition-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid rgba(180, 230, 255, 0.14);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .condition-chip.active {
      color: var(--text);
      border-color: rgba(220, 240, 255, 0.25);
      background: rgba(255, 255, 255, 0.055);
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.08),
        inset 0 0 10px rgba(255, 255, 255, 0.02);
    }

    .condition-icon {
      width: 42px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid rgba(220, 240, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      font-family: "Courier New", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(240, 248, 255, 0.72);
      flex-shrink: 0;
    }

    .condition-chip.active .condition-icon {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(220, 240, 255, 0.30);
      color: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.08),
        inset 0 0 8px rgba(255, 255, 255, 0.03);
    }

    .condition-chip.active[data-type="bleeding"] .condition-icon {
      color: #ff8a8a;
      border-color: rgba(255, 120, 120, 0.45);
    }

    .condition-chip.active[data-type="poisoned"] .condition-icon {
      color: #8dff8d;
      border-color: rgba(120, 255, 120, 0.45);
    }

    .condition-chip.active[data-type="burning"] .condition-icon {
      color: #ffb16b;
      border-color: rgba(255, 177, 107, 0.45);
    }

    .condition-chip.active[data-type="fractured"] .condition-icon {
      color: #efefef;
      border-color: rgba(235, 235, 235, 0.34);
    }

    .condition-chip.active[data-type="frostbite"] .condition-icon {
      color: #8fe8ff;
      border-color: rgba(143, 232, 255, 0.45);
    }

    .condition-chip.active[data-type="necrosis"] .condition-icon {
      color: #d4ff7a;
      border-color: rgba(212, 255, 122, 0.45);
    }

    .injury-legend {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 0 8px rgba(255,255,255,0.04);
    }

    .level-0 { background: rgba(180, 220, 255, 0.10); }
    .level-1 { background: #ffe066; }
    .level-2 { background: #ffb347; }
    .level-3 { background: #ff6b3d; }
    .level-4 { background: #d90429; }

    .attributes {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      overflow: hidden;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 16px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.025);
    }

    .attribute {
      display: block;
      padding: 11px 6px;
      text-align: center;
      border-right: 1px solid rgba(180, 230, 255, 0.12);
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .attribute:hover {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.03);
    }

    .attribute:last-child {
      border-right: none;
    }

    .attr-name {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .attr-value {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
    }

    .sync-section {
      position: relative;
      z-index: 2;
    }

    .sync-link {
      display: block;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      border-radius: 14px;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .sync-link:hover {
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.03);
    }

    .sync-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 17px;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
    }

    .sync-bar {
      position: relative;
      height: 13px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.65);
    }

    .sync-fill {
      position: relative;
      height: 100%;
      width: var(--sync);
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(143, 232, 255, 0.45),
        var(--sync-color),
        rgba(230, 248, 255, 0.92)
      );
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.18),
        0 0 18px rgba(143, 232, 255, 0.08);
      overflow: hidden;
    }

    .sync-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: -35%;
      width: 35%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.85),
        transparent
      );
      animation: barSweep 2.7s linear infinite;
    }

    @keyframes ringSweep {
      from { --sweep-angle: 0deg; }
      to { --sweep-angle: 360deg; }
    }

    @keyframes ringPulse {
      0%, 100% {
        opacity: 0.38;
        filter:
          blur(0.9px)
          drop-shadow(0 0 3px var(--ring-color));
      }

      42% {
        opacity: 0.85;
        filter:
          blur(0.35px)
          drop-shadow(0 0 9px var(--ring-color));
      }

      68% {
        opacity: 0.55;
      }
    }

    @keyframes barSweep {
      from { left: -35%; }
      to { left: 110%; }
    }

    @keyframes panelSweep {
      from { transform: translateX(-120%) rotate(18deg); }
      to { transform: translateX(320%) rotate(18deg); }
    }

    @media (max-width: 860px) {
      .status-core {
        grid-template-columns: 1fr;
      }

      .body-layout {
        grid-template-columns: 1fr;
      }

      .condition-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 12px;
      }

      .interface {
        padding: 16px;
      }

      .character-info {
        align-items: flex-start;
        flex-direction: column;
      }

      .character-meta {
        justify-content: flex-start;
      }

      .attributes {
        grid-template-columns: repeat(3, 1fr);
      }

      .attribute:nth-child(3) {
        border-right: none;
      }

      .attribute:nth-child(-n + 3) {
        border-bottom: 1px solid rgba(180, 230, 255, 0.12);
      }

      .condition-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

    <div class="title">
      <span>Status Interface</span>
      <span>System</span>
    </div>

    <section class="character-info">
      <div class="character-main">
        <span class="character-kicker">Träger</span>
        <strong id="characterName">Ryo</strong>
      </div>

      <div class="character-meta">
        <span class="meta-pill">
          Level <strong id="characterLevel">???</strong>
        </span>

        <span class="meta-pill" id="characterSpecies">
          Mensch (nicht bestätigt)
        </span>
      </div>
    </section>

    <section class="status-core">
      <section class="rings" id="rings"></section>

      <section class="body-status">
        <div class="section-title">
          <span>Körperstatus</span>
          <span id="bodyStatusLabel">Analyse aktiv</span>
        </div>

        <div class="body-layout">
          <div class="body-map-wrap">
            <svg class="body-map scan-map" viewBox="0 0 420 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="humanSilhouette"
      d="M210 48
         C226 48 239 64 239 84
         C239 101 230 113 220 119
         L220 129
         C234 130 249 135 261 144
         C278 157 288 181 294 208
         C300 236 306 257 311 277

  <script>
    const params = new URLSearchParams(window.location.search);

    const links = {
      hp: "https://app.notion.com/p/HP-37e07d209dc08040ab7afe7e2c54058b?source=copy_link",
      mana: "https://app.notion.com/p/Mana-37e07d209dc080e6846ae49e4661d424?source=copy_link",
      stamina: "https://app.notion.com/p/Ausdauer-37e07d209dc08057b996dcdbeee66130?source=copy_link",
      sync: "https://app.notion.com/p/Synchronisation-37e07d209dc080f7a2ddf023359d8cf8?source=copy_link",

      str: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      dex: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      con: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      int: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      wis: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      cha: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link"
    };

    function getText(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") return value;
      }

      return fallback;
    }

    function getNumber(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          const parsed = Number(value.replace(",", "."));
          if (!Number.isNaN(parsed)) return parsed;
        }
      }

      return fallback;
    }

    function getFlag(names, fallback = false) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          const normalized = value.trim().toLowerCase();

          if (["1", "true", "yes", "ja", "on", "active"].includes(normalized)) {
            return true;
          }

          if (["0", "false", "no", "nein", "off", "inactive"].includes(normalized)) {
            return false;
          }
        }
      }

      return fallback;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function percent(current, max) {
      if (!max || max <= 0) return 0;
      return clamp((current / max) * 100, 0, 100);
    }

    function mixColor(colorA, colorB, amount) {
      const a = colorA.match(/\w\w/g).map(hex => parseInt(hex, 16));
      const b = colorB.match(/\w\w/g).map(hex => parseInt(hex, 16));

      const mixed = a.map((value, index) => {
        return Math.round(value + (b[index] - value) * amount);
      });

      return `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`;
    }

    function getHpColor(hpPercent) {
      const red = "cc2114";
      const yellow = "ffc229";
      const green = "14cc14";

      if (hpPercent <= 50) {
        return mixColor(red, yellow, hpPercent / 50);
      }

      return mixColor(yellow, green, (hpPercent - 50) / 50);
    }

    function getStaminaStage(value) {
      const stages = [
        { min: 0, label: "Zusammenbruch" },
        { min: 15, label: "Stark Erschöpft" },
        { min: 30, label: "Erschöpft" },
        { min: 55, label: "Leicht Erschöpft" },
        { min: 75, label: "Fit" },
        { min: 90, label: "Erholt" }
      ];

      let currentStage = stages[0];

      for (const stage of stages) {
        if (value >= stage.min) currentStage = stage;
      }

      return currentStage.label;
    }

    function getInjuryColor(level) {
      const injuryColors = {
        0: "rgba(180, 220, 255, 0.10)",
        1: "#ffe066",
        2: "#ffb347",
        3: "#ff6b3d",
        4: "#d90429"
      };

      return injuryColors[clamp(level, 0, 4)] || injuryColors[0];
    }

    function applyInjury(zoneId, level) {
      const el = document.getElementById(zoneId);
      if (!el) return;

      const clampedLevel = clamp(level, 0, 4);

      if (clampedLevel === 0) {
        el.classList.remove("active");
        el.style.removeProperty("--injury-color");
        el.style.fill = "transparent";
        el.style.stroke = "transparent";
        el.style.filter = "none";
        el.style.animation = "none";
        el.style.opacity = "0";
        return;
      }

      const color = getInjuryColor(clampedLevel);

      const pulseDurations = {
        1: "2.8s",
        2: "2.2s",
        3: "1.7s",
        4: "1.2s"
      };

      el.classList.add("active");
      el.style.setProperty("--injury-color", color);
      el.style.fill = color;
      el.style.stroke = "rgba(255, 248, 248, 0.92)";
      el.style.opacity = "1";
      el.style.filter = `drop-shadow(0 0 ${5 + clampedLevel * 3}px ${color})`;
      el.style.animation = `woundPulse ${pulseDurations[clampedLevel]} ease-in-out infinite`;
    }

    const stats = {
      name: getText("name", "Ryo"),
      level: getText("level", "???"),
      species: getText(["species", "spezies"], "Mensch (nicht bestätigt)"),

      hp: getNumber("hp", 34),
      hpMax: getNumber(["hpmax", "hpMax"], 34),

      mana: getNumber("mana", 0),
      manaMax: getNumber(["manamax", "manaMax"], 0),

      stamina: getNumber(["ausdauer", "stamina"], 90),
      sync: getNumber(["sync", "synchronisation"], 20),

      str: getNumber("str", 16),
      dex: getNumber("dex", 10),
      con: getNumber("con", 16),
      int: getNumber("int", 9),
      wis: getNumber("wis", 16),
      cha: getNumber("cha", 20),

      injuries: {
        head: getNumber("head", 0),
        chest: getNumber("chest", 0),
        abdomen: getNumber("abdomen", 0),
        pelvis: getNumber("pelvis", 0),

        leftArm: getNumber(["leftarm", "larm"], 0),
        rightArm: getNumber(["rightarm", "rarm"], 0),
        leftHand: getNumber(["lefthand", "lhand"], 0),
        rightHand: getNumber(["righthand", "rhand"], 0),

        leftLeg: getNumber(["leftleg", "lleg"], 0),
        rightLeg: getNumber(["rightleg", "rleg"], 0),
        leftFoot: getNumber(["leftfoot", "lfoot"], 0),
        rightFoot: getNumber(["rightfoot", "rfoot"], 0)
      },

      conditions: {
        bleeding: getFlag(["bleeding", "blutung"], false),
        poisoned: getFlag(["poisoned", "vergiftet"], false),
        burning: getFlag(["burning", "verbrannt"], false),
        fractured: getFlag(["fractured", "bruch"], false),
        frostbite: getFlag(["frostbite", "frost", "erfrierung", "erfroren"], false),
        necrosis: getFlag(["necrosis", "nekrose", "verderbnis"], false)
      }
    };

    document.getElementById("characterName").textContent = stats.name;
    document.getElementById("characterLevel").textContent = stats.level;
    document.getElementById("characterSpecies").textContent = stats.species;
    document.getElementById("syncLink").href = links.sync;

    const hpPercent = percent(stats.hp, stats.hpMax);
    const manaPercent = percent(stats.mana, stats.manaMax);
    const staminaPercent = clamp(stats.stamina, 0, 100);
    const syncPercent = clamp(stats.sync, 0, 100);

    const rings = [
      {
        label: "HP",
        valueText: `${stats.hp}/${stats.hpMax}`,
        subText: `${Math.round(hpPercent)}%`,
        percent: hpPercent,
        color: getHpColor(hpPercent),
        link: links.hp,
        speed: 4.4,
        delay: -0.6,
        pulseDelay: -0.2
      },
      {
        label: "Mana",
        valueText: stats.manaMax > 0 ? `${stats.mana}/${stats.manaMax}` : "—",
        subText: stats.manaMax > 0 ? `${Math.round(manaPercent)}%` : "Nicht erwacht",
        percent: manaPercent,
        color: "var(--mana-color)",
        link: links.mana,
        speed: 5.2,
        delay: -1.8,
        pulseDelay: -1.1
      },
      {
        label: "Ausdauer",
        valueText: getStaminaStage(staminaPercent),
        subText: `${Math.round(staminaPercent)}%`,
        percent: staminaPercent,
        color: "var(--stamina-color)",
        link: links.stamina,
        speed: 4.8,
        delay: -2.6,
        pulseDelay: -0.7
      }
    ];

    const attributes = [
      { name: "STR", value: stats.str, link: links.str },
      { name: "DEX", value: stats.dex, link: links.dex },
      { name: "CON", value: stats.con, link: links.con },
      { name: "INT", value: stats.int, link: links.int },
      { name: "WIS", value: stats.wis, link: links.wis },
      { name: "CHA", value: stats.cha, link: links.cha }
    ];

   const conditionConfig = [
  { key: "bleeding",  label: "Blutung",     code: "BLD", zones: ["zone-chest", "zone-leftArm", "zone-rightArm", "zone-leftLeg", "zone-rightLeg"] },
  { key: "poisoned",  label: "Vergiftung",  code: "TOX", zones: ["zone-leftArm", "zone-rightArm"] },
  { key: "burning",   label: "Verbrennung", code: "BRN", zones: ["zone-chest", "zone-leftArm", "zone-rightArm"] },
  { key: "fractured", label: "Fraktur",     code: "FRX", zones: ["zone-leftArm", "zone-rightArm", "zone-leftLeg", "zone-rightLeg"] },
  { key: "frostbite", label: "Erfrierung",  code: "FRS", zones: ["zone-leftHand", "zone-rightHand", "zone-leftFoot", "zone-rightFoot"] },
  { key: "necrosis",  label: "Nekrose",     code: "NEC", zones: ["zone-abdomen", "zone-leftArm", "zone-rightArm", "zone-leftLeg", "zone-rightLeg"] }
];

    const ringsContainer = document.getElementById("rings");

    rings.forEach(ring => {
      const card = document.createElement("a");
      card.href = ring.link;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.className = "ring-card";
      card.style.setProperty("--ring-color", ring.color);
      card.style.setProperty("--angle", `${ring.percent * 3.6}deg`);
      card.style.setProperty("--sweep-speed", `${ring.speed}s`);
      card.style.setProperty("--sweep-delay", `${ring.delay}s`);
      card.style.setProperty("--pulse-delay", `${ring.pulseDelay}s`);

      card.innerHTML = `
        <div class="ring-label">${ring.label}</div>
        <div class="ring">
          <div class="ring-content">
            <div class="ring-value">${ring.valueText}</div>
            <div class="ring-sub">${ring.subText}</div>
          </div>
        </div>
      `;

      ringsContainer.appendChild(card);
    });

    const attributesContainer = document.getElementById("attributes");

    attributes.forEach(attribute => {
      const cell = document.createElement("a");
      cell.href = attribute.link;
      cell.target = "_blank";
      cell.rel = "noopener noreferrer";
      cell.className = "attribute";

      cell.innerHTML = `
        <div class="attr-name">${attribute.name}</div>
        <div class="attr-value">${attribute.value}</div>
      `;

      attributesContainer.appendChild(cell);
    });

    const conditionGrid = document.getElementById("conditionGrid");

    conditionConfig.forEach(condition => {
  const chip = document.createElement("div");
  const active = stats.conditions[condition.key];

  chip.className = `condition-chip${active ? " active" : ""}`;
  chip.dataset.type = condition.key;
  chip.innerHTML = `
    <span class="condition-icon">${condition.code}</span>
    <span>${condition.label}</span>
  `;

  conditionGrid.appendChild(chip);

  if (active && Array.isArray(condition.zones)) {
    condition.zones.forEach(zoneId => {
      addStatusMarker(zoneId, condition.code, condition.key);
    });
  }
});

    const activeConditionCount = Object.values(stats.conditions).filter(Boolean).length;
    document.getElementById("bodyStatusLabel").textContent =
      activeConditionCount > 0
        ? `${activeConditionCount} Status aktiv`
        : "Stabil";

    applyInjury("zone-head", stats.injuries.head);
    applyInjury("zone-chest", stats.injuries.chest);
    applyInjury("zone-abdomen", stats.injuries.abdomen);
    applyInjury("zone-pelvis", stats.injuries.pelvis);

    applyInjury("zone-leftArm", stats.injuries.leftArm);
    applyInjury("zone-rightArm", stats.injuries.rightArm);
    applyInjury("zone-leftHand", stats.injuries.leftHand);
    applyInjury("zone-rightHand", stats.injuries.rightHand);

    applyInjury("zone-leftLeg", stats.injuries.leftLeg);
    applyInjury("zone-rightLeg", stats.injuries.rightLeg);
    applyInjury("zone-leftFoot", stats.injuries.leftFoot);
    applyInjury("zone-rightFoot", stats.injuries.rightFoot);

    function getZoneCenter(zoneId) {
  const el = document.getElementById(zoneId);
  if (!el) return null;

  const bbox = el.getBBox();
  return {
    x: bbox.x + bbox.width / 2,
    y: bbox.y + bbox.height / 2
  };
}

function getMarkerOffset(zoneId) {
  const offsets = {
    "zone-head":      { dx: 34, dy: -20 },
    "zone-chest":     { dx: 42, dy: -12 },
    "zone-abdomen":   { dx: 46, dy: 0 },
    "zone-pelvis":    { dx: 46, dy: 10 },
    "zone-leftArm":   { dx: -62, dy: -10 },
    "zone-rightArm":  { dx: 62, dy: -10 },
    "zone-leftHand":  { dx: -52, dy: 0 },
    "zone-rightHand": { dx: 52, dy: 0 },
    "zone-leftLeg":   { dx: -52, dy: 6 },
    "zone-rightLeg":  { dx: 52, dy: 6 },
    "zone-leftFoot":  { dx: -52, dy: 0 },
    "zone-rightFoot": { dx: 52, dy: 0 }
  };

  return offsets[zoneId] || { dx: 40, dy: 0 };
}

function addStatusMarker(zoneId, code, type) {
  const center = getZoneCenter(zoneId);
  if (!center) return;

  const offset = getMarkerOffset(zoneId);
  const tx = center.x + offset.dx;
  const ty = center.y + offset.dy;

  const markerLayer = document.getElementById("statusMarkers");

  const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
  group.setAttribute("class", "status-marker");
  group.setAttribute("data-type", type);

  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", center.x);
  line.setAttribute("y1", center.y);
  line.setAttribute("x2", tx);
  line.setAttribute("y2", ty);

  const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  dot.setAttribute("class", "status-marker-dot");
  dot.setAttribute("cx", center.x);
  dot.setAttribute("cy", center.y);
  dot.setAttribute("r", "3.3");

  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  rect.setAttribute("class", "status-marker-tag");
  rect.setAttribute("x", tx - 18);
  rect.setAttribute("y", ty - 11);
  rect.setAttribute("width", "36");
  rect.setAttribute("height", "22");
  rect.setAttribute("rx", "6");

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("class", "status-marker-text");
  text.setAttribute("x", tx);
  text.setAttribute("y", ty + 4);
  text.setAttribute("text-anchor", "middle");
  text.textContent = code;

  group.appendChild(line);
  group.appendChild(dot);
  group.appendChild(rect);
  group.appendChild(text);

  markerLayer.appendChild(group);
}

    document.getElementById("syncText").textContent = `${Math.round(syncPercent)}%`;
    document.getElementById("syncFill").style.setProperty("--sync", `${syncPercent}%`);
  </script>
