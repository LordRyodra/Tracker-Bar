<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Tracker</title>

  <style>
    :root {
      --bg: #071012;
      --panel: rgba(8, 22, 25, 0.88);
      --text: #eaffff;
      --muted: rgba(234, 255, 255, 0.68);
      --cyan: #14ccff;
      --track: rgba(120, 255, 255, 0.13);

      --mana-color: #146acc;
      --stamina-color: #14cc92;
      --sync-color: #14ccff;

      --font-main: Calibri, Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    @property --sweep-angle {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(20, 204, 255, 0.12), transparent 34%),
        radial-gradient(circle at 80% 100%, rgba(20, 204, 146, 0.10), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      padding: 22px;
      overflow-x: hidden;
    }

    .interface {
      position: relative;
      width: 100%;
      max-width: 1020px;
      margin: 0 auto;
      padding: 22px;
      border: 1px solid rgba(120, 255, 255, 0.28);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.045), transparent 35%),
        var(--panel);
      box-shadow:
        0 0 18px rgba(20, 204, 255, 0.20),
        inset 0 0 24px rgba(20, 204, 255, 0.08);
      overflow: hidden;
    }

    .interface::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035) 0px,
        rgba(255, 255, 255, 0.035) 1px,
        transparent 1px,
        transparent 7px
      );
      opacity: 0.34;
      pointer-events: none;
    }

    .interface::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -20%;
      width: 45%;
      height: 200%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(180, 255, 255, 0.10),
        transparent
      );
      transform: rotate(18deg);
      animation: panelSweep 7s linear infinite;
      pointer-events: none;
    }

    .title {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(234, 255, 255, 0.9);
      text-shadow: 0 0 10px rgba(20, 204, 255, 0.8);
      font-size: 14px;
    }

    .character-info {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      padding: 14px 16px;
      border: 1px solid rgba(120, 255, 255, 0.20);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.18);
      box-shadow:
        inset 0 0 18px rgba(20, 204, 255, 0.06),
        0 0 12px rgba(20, 204, 255, 0.08);
    }

    .character-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .character-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #characterName {
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1;
      color: var(--text);
      text-shadow:
        0 0 8px rgba(20, 204, 255, 0.9),
        0 0 18px rgba(20, 204, 255, 0.35);
    }

    .character-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .meta-pill {
      padding: 7px 11px;
      border: 1px solid rgba(120, 255, 255, 0.28);
      border-radius: 999px;
      background: rgba(20, 204, 255, 0.07);
      color: var(--text);
      font-size: 13px;
      text-shadow: 0 0 8px rgba(20, 204, 255, 0.6);
    }

    .status-core {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .rings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .ring-card {
      display: block;
      min-width: 0;
      padding: 14px 10px 12px;
      border: 1px solid rgba(120, 255, 255, 0.18);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.18);
      box-shadow: inset 0 0 18px rgba(20, 204, 255, 0.05);
      text-align: center;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .ring-card:hover {
      transform: translateY(-2px);
      border-color: rgba(180, 255, 255, 0.55);
      background: rgba(20, 204, 255, 0.08);
      box-shadow:
        0 0 16px rgba(20, 204, 255, 0.22),
        inset 0 0 22px rgba(20, 204, 255, 0.10);
    }

    .ring-label {
      margin-bottom: 10px;
      font-size: 17px;
      color: var(--text);
      text-shadow: 0 0 8px var(--ring-color);
    }

    .ring {
      position: relative;
      width: clamp(94px, 15vw, 132px);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      background:
        conic-gradient(
          from -90deg,
          var(--ring-color) var(--angle),
          var(--track) 0deg
        );
      box-shadow:
        0 0 15px rgba(20, 204, 255, 0.18),
        inset 0 0 15px rgba(255, 255, 255, 0.08);
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        from var(--sweep-angle),
        transparent 0deg,
        transparent 214deg,
        rgba(255, 255, 255, 0.04) 232deg,
        rgba(255, 255, 255, 0.22) 246deg,
        rgba(255, 255, 255, 0.85) 258deg,
        rgba(255, 255, 255, 0.38) 270deg,
        rgba(255, 255, 255, 0.08) 288deg,
        transparent 310deg,
        transparent 360deg
      );

      -webkit-mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );

      mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );

      -webkit-mask-composite: source-in;
      mask-composite: intersect;

      opacity: 0.7;
      filter:
        blur(0.6px)
        drop-shadow(0 0 5px var(--ring-color));

      mix-blend-mode: screen;

      animation:
        ringSweep var(--sweep-speed, 4.8s) linear infinite,
        ringPulse var(--pulse-speed, 2.9s) ease-in-out infinite;

      animation-delay:
        var(--sweep-delay, 0s),
        var(--pulse-delay, 0s);
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(20, 204, 255, 0.08), transparent 62%),
        rgba(4, 13, 15, 0.96);
      box-shadow:
        inset 0 0 18px rgba(20, 204, 255, 0.10),
        0 0 10px rgba(0, 0, 0, 0.6);
    }

    .ring-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-shadow: 0 0 10px var(--ring-color);
    }

    .ring-value {
      font-size: clamp(15px, 3.2vw, 23px);
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
    }

    .ring-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.1;
    }

    .body-status {
      border: 1px solid rgba(120, 255, 255, 0.22);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.18);
      padding: 16px;
      box-shadow:
        inset 0 0 18px rgba(20, 204, 255, 0.05),
        0 0 10px rgba(20, 204, 255, 0.08);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 16px;
      text-shadow: 0 0 8px rgba(20, 204, 255, 0.7);
    }

    .body-layout {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 220px;
      gap: 18px;
      align-items: center;
    }

    .body-map-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 360px;
    }

    .body-map {
      width: min(100%, 340px);
      height: auto;
      filter: drop-shadow(0 0 14px rgba(20, 204, 255, 0.14));
    }

    .body-guide {
      stroke: rgba(150, 255, 255, 0.16);
      stroke-width: 1.5;
      fill: none;
    }

    .body-base,
    .body-zone {
      stroke: rgba(190, 255, 255, 0.40);
      stroke-width: 2;
    }

    .body-base {
      fill: rgba(120, 255, 255, 0.08);
    }

    .body-zone {
      fill: rgba(120, 255, 255, 0.08);
      transition:
        fill 0.35s ease,
        filter 0.35s ease,
        stroke 0.35s ease,
        transform 0.2s ease;
    }

    .body-zone:hover {
      stroke: rgba(255, 255, 255, 0.9);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.25));
    }

    .condition-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .condition-title {
      font-size: 14px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .condition-grid {
      display: grid;
      gap: 10px;
    }

    .condition-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid rgba(120, 255, 255, 0.16);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease,
        transform 0.18s ease;
    }

    .condition-chip.active {
      color: var(--text);
      border-color: rgba(180, 255, 255, 0.42);
      background: rgba(20, 204, 255, 0.08);
      box-shadow:
        0 0 10px rgba(20, 204, 255, 0.14),
        inset 0 0 12px rgba(20, 204, 255, 0.08);
    }

    .condition-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 16px;
      flex-shrink: 0;
    }

    .condition-chip.active .condition-icon {
      background: rgba(20, 204, 255, 0.14);
      text-shadow: 0 0 10px rgba(20, 204, 255, 0.9);
    }

    .injury-legend {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 0 8px rgba(255,255,255,0.06);
    }

    .level-0 { background: rgba(120, 255, 255, 0.08); }
    .level-1 { background: #ffe066; }
    .level-2 { background: #ffb347; }
    .level-3 { background: #ff6b3d; }
    .level-4 { background: #d90429; }

    .attributes {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      overflow: hidden;
      border: 1px solid rgba(120, 255, 255, 0.22);
      border-radius: 16px;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.18);
    }

    .attribute {
      display: block;
      padding: 11px 6px;
      text-align: center;
      border-right: 1px solid rgba(120, 255, 255, 0.16);
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .attribute:hover {
      background: rgba(20, 204, 255, 0.10);
      box-shadow: inset 0 0 14px rgba(20, 204, 255, 0.12);
    }

    .attribute:last-child {
      border-right: none;
    }

    .attr-name {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .attr-value {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 0 9px rgba(20, 204, 255, 0.7);
    }

    .sync-section {
      position: relative;
      z-index: 2;
    }

    .sync-link {
      display: block;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      border-radius: 14px;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .sync-link:hover {
      background: rgba(20, 204, 255, 0.08);
      box-shadow: inset 0 0 16px rgba(20, 204, 255, 0.10);
    }

    .sync-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 17px;
      text-shadow: 0 0 8px rgba(20, 204, 255, 0.7);
    }

    .sync-bar {
      position: relative;
      height: 13px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.65);
    }

    .sync-fill {
      position: relative;
      height: 100%;
      width: var(--sync);
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(20, 204, 146, 0.75),
        var(--sync-color),
        rgba(200, 255, 255, 0.95)
      );
      box-shadow:
        0 0 12px rgba(20, 204, 255, 0.65),
        0 0 24px rgba(20, 204, 255, 0.25);
      overflow: hidden;
    }

    .sync-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: -35%;
      width: 35%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.9),
        transparent
      );
      animation: barSweep 2.7s linear infinite;
    }

    @keyframes ringSweep {
      from { --sweep-angle: 0deg; }
      to { --sweep-angle: 360deg; }
    }

    @keyframes ringPulse {
      0%, 100% {
        opacity: 0.38;
        filter:
          blur(0.9px)
          drop-shadow(0 0 3px var(--ring-color));
      }

      42% {
        opacity: 0.85;
        filter:
          blur(0.35px)
          drop-shadow(0 0 9px var(--ring-color));
      }

      68% {
        opacity: 0.55;
      }
    }

    @keyframes barSweep {
      from { left: -35%; }
      to { left: 110%; }
    }

    @keyframes panelSweep {
      from { transform: translateX(-120%) rotate(18deg); }
      to { transform: translateX(320%) rotate(18deg); }
    }

    @media (max-width: 760px) {
      .status-core {
        grid-template-columns: 1fr;
      }

      .rings {
        grid-template-columns: repeat(3, 1fr);
      }

      .body-layout {
        grid-template-columns: 1fr;
      }

      .condition-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 12px;
      }

      .interface {
        padding: 16px;
      }

      .character-info {
        align-items: flex-start;
        flex-direction: column;
      }

      .character-meta {
        justify-content: flex-start;
      }

      .rings {
        grid-template-columns: 1fr;
      }

      .ring-card {
        padding: 10px 6px;
      }

      .attributes {
        grid-template-columns: repeat(3, 1fr);
      }

      .attribute:nth-child(3) {
        border-right: none;
      }

      .attribute:nth-child(-n + 3) {
        border-bottom: 1px solid rgba(120, 255, 255, 0.16);
      }
    }
  </style>
</head>

      cha: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link"
    };

    function getText(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          return value;
        }
      }

      return fallback;
    }

    function getNumber(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          const parsed = Number(value.replace(",", "."));
          if (!Number.isNaN(parsed)) return parsed;
        }
      }

      return fallback;
    }

    function getFlag(names, fallback = false) {
      const nameList = Array.isArray(names) ? names : [names];

      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          const normalized = value.trim().toLowerCase();

          if (["1", "true", "yes", "ja", "on", "active"].includes(normalized)) {
            return true;
          }

          if (["0", "false", "no", "nein", "off", "inactive"].includes(normalized)) {
            return false;
          }
        }
      }

      return fallback;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function percent(current, max) {
      if (!max || max <= 0) return 0;
      return clamp((current / max) * 100, 0, 100);
    }

    function mixColor(colorA, colorB, amount) {
      const a = colorA.match(/\w\w/g).map(hex => parseInt(hex, 16));
      const b = colorB.match(/\w\w/g).map(hex => parseInt(hex, 16));

      const mixed = a.map((value, index) => {
        return Math.round(value + (b[index] - value) * amount);
      });

      return `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`;
    }

    function getHpColor(hpPercent) {
      const red = "cc2114";
      const yellow = "ffc229";
      const green = "14cc14";

      if (hpPercent <= 50) {
        return mixColor(red, yellow, hpPercent / 50);
      }

      return mixColor(yellow, green, (hpPercent - 50) / 50);
    }

    function getStaminaStage(value) {
      const stages = [
        { min: 0, label: "Zusammenbruch" },
        { min: 15, label: "Stark Erschöpft" },
        { min: 30, label: "Erschöpft" },
        { min: 55, label: "Leicht Erschöpft" },
        { min: 75, label: "Fit" },
        { min: 90, label: "Erholt" }
      ];

      let currentStage = stages[0];

      for (const stage of stages) {
        if (value >= stage.min) {
          currentStage = stage;
        }
      }

      return currentStage.label;
    }

    function getInjuryColor(level) {
      const injuryColors = {
        0: "rgba(120, 255, 255, 0.08)",
        1: "#ffe066",
        2: "#ffb347",
        3: "#ff6b3d",
        4: "#d90429"
      };

      return injuryColors[clamp(level, 0, 4)] || injuryColors[0];
    }

    function applyInjury(zoneId, level) {
      const el = document.getElementById(zoneId);
      if (!el) return;

      const clampedLevel = clamp(level, 0, 4);
      const color = getInjuryColor(clampedLevel);

      el.style.fill = color;
      el.style.stroke = clampedLevel > 0
        ? "rgba(255, 245, 245, 0.82)"
        : "rgba(190, 255, 255, 0.40)";

      el.style.filter = clampedLevel > 0
        ? `drop-shadow(0 0 ${4 + clampedLevel * 2}px ${color})`
        : "none";
    }

    const stats = {
      name: getText("name", "Ryo"),
      level: getText("level", "???"),
      species: getText(["species", "spezies"], "Mensch (nicht bestätigt)"),

      hp: getNumber("hp", 34),
      hpMax: getNumber(["hpmax", "hpMax"], 34),

      mana: getNumber("mana", 0),
      manaMax: getNumber(["manamax", "manaMax"], 0),

      stamina: getNumber(["ausdauer", "stamina"], 90),
      sync: getNumber(["sync", "synchronisation"], 20),

      str: getNumber("str", 16),
      dex: getNumber("dex", 10),
      con: getNumber("con", 16),
      int: getNumber("int", 9),
      wis: getNumber("wis", 16),
      cha: getNumber("cha", 20),

      injuries: {
        head: getNumber("head", 0),
        chest: getNumber("chest", 0),
        abdomen: getNumber("abdomen", 0),
        pelvis: getNumber("pelvis", 0),

        leftArm: getNumber(["leftarm", "larm"], 0),
        rightArm: getNumber(["rightarm", "rarm"], 0),
        leftHand: getNumber(["lefthand", "lhand"], 0),
        rightHand: getNumber(["righthand", "rhand"], 0),

        leftLeg: getNumber(["leftleg", "lleg"], 0),
        rightLeg: getNumber(["rightleg", "rleg"], 0),
        leftFoot: getNumber(["leftfoot", "lfoot"], 0),
        rightFoot: getNumber(["rightfoot", "rfoot"], 0)
      },

      conditions: {
        bleeding: getFlag(["bleeding", "blutung"], false),
        poisoned: getFlag(["poisoned", "vergiftet"], false),
        burning: getFlag(["burning", "verbrannt"], false),
        fractured: getFlag(["fractured", "bruch"], false),
        stunned: getFlag(["stunned", "benommen"], false),
        infected: getFlag(["infected", "infektion"], false)
      }
    };

    document.getElementById("characterName").textContent = stats.name;
    document.getElementById("characterLevel").textContent = stats.level;
    document.getElementById("characterSpecies").textContent = stats.species;
    document.getElementById("syncLink").href = links.sync;

    const hpPercent = percent(stats.hp, stats.hpMax);
    const manaPercent = percent(stats.mana, stats.manaMax);
    const staminaPercent = clamp(stats.stamina, 0, 100);
    const syncPercent = clamp(stats.sync, 0, 100);

    const rings = [
      {
        label: "HP",
        valueText: `${stats.hp}/${stats.hpMax}`,
        subText: `${Math.round(hpPercent)}%`,
        percent: hpPercent,
        color: getHpColor(hpPercent),
        link: links.hp,
        speed: 4.4,
        delay: -0.6,
        pulseDelay: -0.2
      },
      {
        label: "Mana",
        valueText: stats.manaMax > 0 ? `${stats.mana}/${stats.manaMax}` : "—",
        subText: stats.manaMax > 0 ? `${Math.round(manaPercent)}%` : "Nicht erwacht",
        percent: manaPercent,
        color: "var(--mana-color)",
        link: links.mana,
        speed: 5.2,
        delay: -1.8,
        pulseDelay: -1.1
      },
      {
        label: "Ausdauer",
        valueText: getStaminaStage(staminaPercent),
        subText: `${Math.round(staminaPercent)}%`,
        percent: staminaPercent,
        color: "var(--stamina-color)",
        link: links.stamina,
        speed: 4.8,
        delay: -2.6,
        pulseDelay: -0.7
      }
    ];

    const attributes = [
      { name: "STR", value: stats.str, link: links.str },
      { name: "DEX", value: stats.dex, link: links.dex },
      { name: "CON", value: stats.con, link: links.con },
      { name: "INT", value: stats.int, link: links.int },
      { name: "WIS", value: stats.wis, link: links.wis },
      { name: "CHA", value: stats.cha, link: links.cha }
    ];

    const ringsContainer = document.getElementById("rings");

    rings.forEach(ring => {
      const card = document.createElement("a");
      card.href = ring.link;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.className = "ring-card";
      card.style.setProperty("--ring-color", ring.color);
      card.style.setProperty("--angle", `${ring.percent * 3.6}deg`);
      card.style.setProperty("--sweep-speed", `${ring.speed}s`);
      card.style.setProperty("--sweep-delay", `${ring.delay}s`);
      card.style.setProperty("--pulse-delay", `${ring.pulseDelay}s`);

      card.innerHTML = `
        <div class="ring-label">${ring.label}</div>
        <div class="ring">
          <div class="ring-content">
            <div class="ring-value">${ring.valueText}</div>
            <div class="ring-sub">${ring.subText}</div>
          </div>
        </div>
      `;

      ringsContainer.appendChild(card);
    });

    const attributesContainer = document.getElementById("attributes");

    attributes.forEach(attribute => {
      const cell = document.createElement("a");
      cell.href = attribute.link;
      cell.target = "_blank";
      cell.rel = "noopener noreferrer";
      cell.className = "attribute";

      cell.innerHTML = `
        <div class="attr-name">${attribute.name}</div>
        <div class="attr-value">${attribute.value}</div>
      `;

      attributesContainer.appendChild(cell);
    });

    const conditionConfig = [
      { key: "bleeding", label: "Blutung", icon: "🩸" },
      { key: "poisoned", label: "Vergiftet", icon: "☠" },
      { key: "burning", label: "Verbrannt", icon: "🔥" },
      { key: "fractured", label: "Bruch", icon: "🦴" },
      { key: "stunned", label: "Benommen", icon: "💫" },
      { key: "infected", label: "Infektion", icon: "🦠" }
    ];

    const conditionGrid = document.getElementById("conditionGrid");

    conditionConfig.forEach(condition => {
      const chip = document.createElement("div");
      const active = stats.conditions[condition.key];

      chip.className = `condition-chip${active ? " active" : ""}`;
      chip.innerHTML = `
        <span class="condition-icon">${condition.icon}</span>
        <span>${condition.label}</span>
      `;

      conditionGrid.appendChild(chip);
    });

    const activeConditionCount = Object.values(stats.conditions).filter(Boolean).length;
    document.getElementById("bodyStatusLabel").textContent =
      activeConditionCount > 0
        ? `${activeConditionCount} Status aktiv`
        : "Stabil";

    applyInjury("zone-head", stats.injuries.head);
    applyInjury("zone-chest", stats.injuries.chest);
    applyInjury("zone-abdomen", stats.injuries.abdomen);
    applyInjury("zone-pelvis", stats.injuries.pelvis);

    applyInjury("zone-leftArm", stats.injuries.leftArm);
    applyInjury("zone-rightArm", stats.injuries.rightArm);
    applyInjury("zone-leftHand", stats.injuries.leftHand);
    applyInjury("zone-rightHand", stats.injuries.rightHand);

    applyInjury("zone-leftLeg", stats.injuries.leftLeg);
    applyInjury("zone-rightLeg", stats.injuries.rightLeg);
    applyInjury("zone-leftFoot", stats.injuries.leftFoot);
    applyInjury("zone-rightFoot", stats.injuries.rightFoot);

    document.getElementById("syncText").textContent = `${Math.round(syncPercent)}%`;
    document.getElementById("syncFill").style.setProperty("--sync", `${syncPercent}%`);
  </script>
</body>
</html>
