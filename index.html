<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Tracker</title>

  <style>
    :root {
      --bg: #04080b;
      --panel: rgba(7, 16, 20, 0.92);
      --text: #f1fbff;
      --muted: rgba(220, 240, 255, 0.64);
      --track: rgba(180, 230, 255, 0.12);

      --mana-color: #3fa6ff;
      --stamina-color: #39d7a0;
      --sync-color: #87ecff;

      --font-main: Calibri, Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    @property --sweep-angle {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(120, 220, 255, 0.08), transparent 32%),
        radial-gradient(circle at 80% 100%, rgba(120, 220, 255, 0.05), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      padding: 22px;
      overflow-x: hidden;
    }

    .interface {
      position: relative;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 22px;
      border: 1px solid rgba(180, 230, 255, 0.22);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.035), transparent 35%),
        var(--panel);
      box-shadow:
        0 0 20px rgba(143, 232, 255, 0.10),
        inset 0 0 30px rgba(143, 232, 255, 0.05);
      overflow: hidden;
    }

    .interface::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.08;
      pointer-events: none;
    }

    .interface::after {
      content: "";
      position: absolute;
      top: -60%;
      left: -15%;
      width: 40%;
      height: 220%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.07),
        transparent
      );
      transform: rotate(18deg);
      animation: panelSweep 8s linear infinite;
      pointer-events: none;
    }

    .title {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(235, 248, 255, 0.92);
      text-shadow: 0 0 10px rgba(143, 232, 255, 0.45);
      font-size: 14px;
    }

    .character-info {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      padding: 14px 16px;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow:
        inset 0 0 18px rgba(143, 232, 255, 0.04),
        0 0 10px rgba(143, 232, 255, 0.05);
    }

    .character-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .character-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #characterName {
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1;
      color: var(--text);
      text-shadow:
        0 0 7px rgba(143, 232, 255, 0.45),
        0 0 16px rgba(143, 232, 255, 0.18);
    }

    .character-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .meta-pill {
      padding: 7px 11px;
      border: 1px solid rgba(180, 230, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 13px;
      text-shadow: 0 0 6px rgba(143, 232, 255, 0.18);
    }

    .status-core {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .rings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .ring-card {
      display: block;
      min-width: 0;
      padding: 14px 10px 12px;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 18px rgba(143, 232, 255, 0.03);
      text-align: center;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .ring-card:hover {
      transform: translateY(-2px);
      border-color: rgba(220, 240, 255, 0.34);
      background: rgba(255, 255, 255, 0.045);
      box-shadow:
        0 0 14px rgba(143, 232, 255, 0.10),
        inset 0 0 18px rgba(255, 255, 255, 0.04);
    }

    .ring-label {
      margin-bottom: 10px;
      font-size: 17px;
      color: var(--text);
      text-shadow: 0 0 8px var(--ring-color);
    }

    .ring {
      position: relative;
      width: clamp(98px, 16vw, 136px);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      background:
        conic-gradient(
          from -90deg,
          var(--ring-color) var(--angle),
          var(--track) 0deg
        );
      box-shadow:
        0 0 14px rgba(255, 255, 255, 0.04),
        inset 0 0 14px rgba(255, 255, 255, 0.05);
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        from var(--sweep-angle),
        transparent 0deg,
        transparent 214deg,
        rgba(255, 255, 255, 0.04) 232deg,
        rgba(255, 255, 255, 0.22) 246deg,
        rgba(255, 255, 255, 0.88) 258deg,
        rgba(255, 255, 255, 0.34) 270deg,
        rgba(255, 255, 255, 0.08) 288deg,
        transparent 310deg,
        transparent 360deg
      );
      -webkit-mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );
      mask:
        radial-gradient(
          farthest-side,
          transparent calc(100% - 16px),
          black calc(100% - 15px)
        ),
        conic-gradient(
          from -90deg,
          black 0deg var(--angle),
          transparent var(--angle) 360deg
        );
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
      opacity: 0.7;
      filter:
        blur(0.6px)
        drop-shadow(0 0 5px var(--ring-color));
      mix-blend-mode: screen;
      animation:
        ringSweep var(--sweep-speed, 4.8s) linear infinite,
        ringPulse var(--pulse-speed, 2.9s) ease-in-out infinite;
      animation-delay:
        var(--sweep-delay, 0s),
        var(--pulse-delay, 0s);
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(143, 232, 255, 0.06), transparent 62%),
        rgba(4, 10, 13, 0.98);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.06),
        0 0 10px rgba(0, 0, 0, 0.6);
    }

    .ring-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-shadow: 0 0 10px var(--ring-color);
    }

    .ring-value {
      font-size: clamp(15px, 3.2vw, 23px);
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
    }

    .ring-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.1;
      text-align: center;
    }

    .body-status {
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
      box-shadow:
        inset 0 0 18px rgba(143, 232, 255, 0.03),
        0 0 10px rgba(143, 232, 255, 0.05);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 16px;
      text-shadow: 0 0 8px rgba(143, 232, 255, 0.25);
    }

    .body-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 230px;
      gap: 18px;
      align-items: center;
    }

    .body-map-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 440px;
      padding: 8px 0;
    }

    .scan-map {
      width: min(100%, 390px);
      height: auto;
      filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.05));
    }

    .scan-ui .frame-line {
      stroke: rgba(225, 240, 255, 0.50);
      stroke-width: 2;
      fill: none;
    }

    .scan-ui .frame-line.faint,
    .scan-ui .frame-grid {
      stroke: rgba(225, 240, 255, 0.14);
      stroke-width: 1;
      fill: none;
    }

    .scan-box {
      fill: rgba(255, 255, 255, 0.04);
      stroke: rgba(225, 240, 255, 0.22);
      stroke-width: 1.1;
    }

    .scan-box.faint {
      fill: rgba(255, 255, 255, 0.02);
    }

    .scan-label {
      fill: rgba(245, 250, 255, 0.88);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.08em;
    }

    .scan-label.big {
      font-size: 24px;
      font-weight: 700;
    }

    .scan-label.small {
      font-size: 12px;
      font-weight: 700;
    }

    .scan-label.tiny {
      font-size: 8px;
    }

    .body-glow {
      fill: none;
      stroke: rgba(40, 245, 255, 0.28);
      stroke-width: 9;
      filter: blur(3px) drop-shadow(0 0 15px rgba(40, 245, 255, 0.25));
      opacity: 0.6;
    }

    .body-silhouette {
      fill: rgba(40, 245, 255, 0.055);
      stroke: rgba(90, 250, 255, 0.95);
      stroke-width: 2.2;
      filter:
        drop-shadow(0 0 8px rgba(40, 245, 255, 0.35))
        drop-shadow(0 0 18px rgba(40, 245, 255, 0.10));
    }

    .body-inner-line {
      fill: none;
      stroke: rgba(215, 255, 255, 0.16);
      stroke-width: 1.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .body-zone {
      fill: transparent;
      stroke: transparent;
      stroke-width: 1.2;
      opacity: 0;
      transition:
        fill 0.25s ease,
        stroke 0.25s ease,
        filter 0.25s ease,
        opacity 0.25s ease;
    }

    .body-zone.active {
      opacity: 1;
    }

    @keyframes woundPulse {
      0%, 100% {
        opacity: 0.68;
        filter: drop-shadow(0 0 6px var(--injury-color));
      }
      50% {
        opacity: 1;
        filter: drop-shadow(0 0 18px var(--injury-color));
      }
    }

    .status-marker-layer {
      pointer-events: none;
    }

    .status-marker line {
      stroke: rgba(190, 255, 255, 0.72);
      stroke-width: 1.2;
    }

    .status-marker-dot {
      fill: rgba(190, 255, 255, 0.96);
      filter: drop-shadow(0 0 6px rgba(190, 255, 255, 0.65));
    }

    .status-marker-tag {
      fill: rgba(7, 16, 20, 0.94);
      stroke: rgba(120, 255, 255, 0.48);
      stroke-width: 1;
    }

    .status-marker-text {
      fill: rgba(245, 255, 255, 0.96);
      font-family: "Courier New", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .status-marker[data-type="bleeding"] .status-marker-tag {
      stroke: rgba(255, 120, 120, 0.6);
    }

    .status-marker[data-type="poisoned"] .status-marker-tag {
      stroke: rgba(120, 255, 120, 0.6);
    }

    .status-marker[data-type="burning"] .status-marker-tag {
      stroke: rgba(255, 177, 107, 0.6);
    }

    .status-marker[data-type="fractured"] .status-marker-tag {
      stroke: rgba(240, 240, 240, 0.55);
    }

    .status-marker[data-type="frostbite"] .status-marker-tag {
      stroke: rgba(143, 232, 255, 0.68);
    }

    .status-marker[data-type="necrosis"] .status-marker-tag {
      stroke: rgba(212, 255, 122, 0.68);
    }

    .condition-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .condition-title {
      font-size: 14px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .condition-grid {
      display: grid;
      gap: 10px;
    }

    .condition-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid rgba(180, 230, 255, 0.14);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .condition-chip.active {
      color: var(--text);
      border-color: rgba(220, 240, 255, 0.25);
      background: rgba(255, 255, 255, 0.055);
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.08),
        inset 0 0 10px rgba(255, 255, 255, 0.02);
    }

    .condition-icon {
      width: 42px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid rgba(220, 240, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      font-family: "Courier New", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(240, 248, 255, 0.72);
      flex-shrink: 0;
    }

    .condition-chip.active .condition-icon {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(220, 240, 255, 0.30);
      color: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.08),
        inset 0 0 8px rgba(255, 255, 255, 0.03);
    }

    .condition-chip.active[data-type="bleeding"] .condition-icon {
      color: #ff8a8a;
      border-color: rgba(255, 120, 120, 0.45);
    }

    .condition-chip.active[data-type="poisoned"] .condition-icon {
      color: #8dff8d;
      border-color: rgba(120, 255, 120, 0.45);
    }

    .condition-chip.active[data-type="burning"] .condition-icon {
      color: #ffb16b;
      border-color: rgba(255, 177, 107, 0.45);
    }

    .condition-chip.active[data-type="fractured"] .condition-icon {
      color: #efefef;
      border-color: rgba(235, 235, 235, 0.34);
    }

    .condition-chip.active[data-type="frostbite"] .condition-icon {
      color: #8fe8ff;
      border-color: rgba(143, 232, 255, 0.45);
    }

    .condition-chip.active[data-type="necrosis"] .condition-icon {
      color: #d4ff7a;
      border-color: rgba(212, 255, 122, 0.45);
    }

    .injury-legend {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 0 8px rgba(255,255,255,0.04);
    }

    .level-0 { background: rgba(180, 220, 255, 0.10); }
    .level-1 { background: #ffe066; }
    .level-2 { background: #ffb347; }
    .level-3 { background: #ff6b3d; }
    .level-4 { background: #d90429; }

    .attributes {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      overflow: hidden;
      border: 1px solid rgba(180, 230, 255, 0.16);
      border-radius: 16px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.025);
    }

    .attribute {
      display: block;
      padding: 11px 6px;
      text-align: center;
      border-right: 1px solid rgba(180, 230, 255, 0.12);
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .attribute:hover {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.03);
    }

    .attribute:last-child {
      border-right: none;
    }

    .attr-name {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .attr-value {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
    }

    .sync-section {
      position: relative;
      z-index: 2;
    }

    .sync-link {
      display: block;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      border-radius: 14px;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .sync-link:hover {
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.03);
    }

    .sync-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 17px;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
    }

    .sync-bar {
      position: relative;
      height: 13px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.65);
    }

    .sync-fill {
      position: relative;
      height: 100%;
      width: var(--sync);
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(143, 232, 255, 0.45),
        var(--sync-color),
        rgba(230, 248, 255, 0.92)
      );
      box-shadow:
        0 0 10px rgba(143, 232, 255, 0.18),
        0 0 18px rgba(143, 232, 255, 0.08);
      overflow: hidden;
    }

    .sync-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: -35%;
      width: 35%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.85),
        transparent
      );
      animation: barSweep 2.7s linear infinite;
    }

    @keyframes ringSweep {
      from { --sweep-angle: 0deg; }
      to { --sweep-angle: 360deg; }
    }

    @keyframes ringPulse {
      0%, 100% {
        opacity: 0.38;
        filter:
          blur(0.9px)
          drop-shadow(0 0 3px var(--ring-color));
      }
      42% {
        opacity: 0.85;
        filter:
          blur(0.35px)
          drop-shadow(0 0 9px var(--ring-color));
      }
      68% {
        opacity: 0.55;
      }
    }

    @keyframes barSweep {
      from { left: -35%; }
      to { left: 110%; }
    }

    @keyframes panelSweep {
      from { transform: translateX(-120%) rotate(18deg); }
      to { transform: translateX(320%) rotate(18deg); }
    }

    @media (max-width: 900px) {
      .status-core {
        grid-template-columns: 1fr;
      }

      .body-layout {
        grid-template-columns: 1fr;
      }

      .condition-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 12px;
      }

      .interface {
        padding: 16px;
      }

      .character-info {
        align-items: flex-start;
        flex-direction: column;
      }

      .character-meta {
        justify-content: flex-start;
      }

      .attributes {
        grid-template-columns: repeat(3, 1fr);
      }

      .attribute:nth-child(3) {
        border-right: none;
      }

      .attribute:nth-child(-n + 3) {
        border-bottom: 1px solid rgba(180, 230, 255, 0.12);
      }

      .condition-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="interface">
    <div class="title">
      <span>Status Interface</span>
      <span>System</span>
    </div>

    <section class="character-info">
      <div class="character-main">
        <span class="character-kicker">Träger</span>
        <strong id="characterName">Ryo</strong>
      </div>

      <div class="character-meta">
        <span class="meta-pill">
          Level <strong id="characterLevel">???</strong>
        </span>
        <span class="meta-pill" id="characterSpecies">Mensch (nicht bestätigt)</span>
      </div>
    </section>

    <section class="status-core">
      <section class="rings" id="rings"></section>

      <section class="body-status">
        <div class="section-title">
          <span>Körperstatus</span>
          <span id="bodyStatusLabel">Analyse aktiv</span>
        </div>

        <div class="body-layout">
          <div class="body-map-wrap">
            <svg class="body-map scan-map" viewBox="0 0 420 540" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <ellipse id="headShape" cx="210" cy="84" rx="23" ry="35" />

                <path id="bodyShape"
                  d="M202 120
                     L202 132
                     C186 134 172 141 161 153
                     C149 166 142 185 139 207
                     C136 230 134 255 131 279
                     C129 298 124 316 116 334
                     C110 349 111 361 118 367
                     C126 373 136 369 143 356
                     C150 343 155 326 159 307
                     C164 281 168 250 172 220
                     C174 201 177 182 183 168
                     C180 190 179 211 179 232

  <script>
    const params = new URLSearchParams(window.location.search);

    const links = {
      hp: "https://app.notion.com/p/HP-37e07d209dc08040ab7afe7e2c54058b?source=copy_link",
      mana: "https://app.notion.com/p/Mana-37e07d209dc080e6846ae49e4661d424?source=copy_link",
      stamina: "https://app.notion.com/p/Ausdauer-37e07d209dc08057b996dcdbeee66130?source=copy_link",
      sync: "https://app.notion.com/p/Synchronisation-37e07d209dc080f7a2ddf023359d8cf8?source=copy_link",

      str: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      dex: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      con: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      int: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      wis: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link",
      cha: "https://app.notion.com/p/Attribute-37e07d209dc08054be71dbab71205405?source=copy_link"
    };

    function getText(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];
      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") return value;
      }
      return fallback;
    }

    function getNumber(names, fallback) {
      const nameList = Array.isArray(names) ? names : [names];
      for (const name of nameList) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          const parsed = Number(value.replace(",", "."));
          if (!Number.isNaN(parsed)) return parsed;
        }
      }
      return fallback;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function percent(current, max) {
      if (!max || max <= 0) return 0;
      return clamp((current / max) * 100, 0, 100);
    }

    function mixColor(colorA, colorB, amount) {
      const a = colorA.match(/\w\w/g).map(hex => parseInt(hex, 16));
      const b = colorB.match(/\w\w/g).map(hex => parseInt(hex, 16));
      const mixed = a.map((value, index) => {
        return Math.round(value + (b[index] - value) * amount);
      });
      return `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`;
    }

    function getHpColor(hpPercent) {
      const red = "cc2114";
      const yellow = "ffc229";
      const green = "14cc14";

      if (hpPercent <= 50) {
        return mixColor(red, yellow, hpPercent / 50);
      }

      return mixColor(yellow, green, (hpPercent - 50) / 50);
    }

    function getStaminaStage(value) {
      const stages = [
        { min: 0, label: "Zusammenbruch" },
        { min: 15, label: "Stark Erschöpft" },
        { min: 30, label: "Erschöpft" },
        { min: 55, label: "Leicht Erschöpft" },
        { min: 75, label: "Fit" },
        { min: 90, label: "Erholt" }
      ];

      let currentStage = stages[0];
      for (const stage of stages) {
        if (value >= stage.min) currentStage = stage;
      }
      return currentStage.label;
    }

    function getInjuryColor(level) {
      const injuryColors = {
        0: "rgba(180, 220, 255, 0.10)",
        1: "#ffe066",
        2: "#ffb347",
        3: "#ff6b3d",
        4: "#d90429"
      };
      return injuryColors[clamp(level, 0, 4)] || injuryColors[0];
    }

    function applyInjury(zoneId, level) {
      const el = document.getElementById(zoneId);
      if (!el) return;

      const clampedLevel = clamp(level, 0, 4);

      if (clampedLevel === 0) {
        el.classList.remove("active");
        el.style.removeProperty("--injury-color");
        el.style.fill = "transparent";
        el.style.stroke = "transparent";
        el.style.filter = "none";
        el.style.animation = "none";
        el.style.opacity = "0";
        return;
      }

      const color = getInjuryColor(clampedLevel);

      const pulseDurations = {
        1: "2.8s",
        2: "2.2s",
        3: "1.7s",
        4: "1.2s"
      };

      el.classList.add("active");
      el.style.setProperty("--injury-color", color);
      el.style.fill = color;
      el.style.stroke = "rgba(255, 248, 248, 0.92)";
      el.style.opacity = "1";
      el.style.filter = `drop-shadow(0 0 ${5 + clampedLevel * 3}px ${color})`;
      el.style.animation = `woundPulse ${pulseDurations[clampedLevel]} ease-in-out infinite`;
    }

    function getLegacyAwareLevel(primaryKeys, legacyKeys = []) {
      const direct = getNumber(primaryKeys, null);
      if (direct !== null) return direct;
      return getNumber(legacyKeys, 0);
    }

    function expandZoneToken(zone) {
      const normalized = zone.trim().toLowerCase().replace(/[\s_-]+/g, "");

      const aliases = {
        head: ["head"],
        chest: ["chest"],
        abdomen: ["abdomen"],
        belly: ["abdomen"],
        pelvis: ["pelvis"],

        leftarm: ["leftUpperArm", "leftForearm"],
        larm: ["leftUpperArm", "leftForearm"],
        leftupperarm: ["leftUpperArm"],
        luparm: ["leftUpperArm"],
        leftforearm: ["leftForearm"],
        lforearm: ["leftForearm"],
        lefthand: ["leftHand"],
        lhand: ["leftHand"],

        rightarm: ["rightUpperArm", "rightForearm"],
        rarm: ["rightUpperArm", "rightForearm"],
        rightupperarm: ["rightUpperArm"],
        ruparm: ["rightUpperArm"],
        rightforearm: ["rightForearm"],
        rforearm: ["rightForearm"],
        righthand: ["rightHand"],
        rhand: ["rightHand"],

        leftleg: ["leftThigh", "leftLowerLeg"],
        lleg: ["leftThigh", "leftLowerLeg"],
        leftthigh: ["leftThigh"],
        lthigh: ["leftThigh"],
        leftlowerleg: ["leftLowerLeg"],
        llowerleg: ["leftLowerLeg"],
        leftfoot: ["leftFoot"],
        lfoot: ["leftFoot"],

        rightleg: ["rightThigh", "rightLowerLeg"],
        rleg: ["rightThigh", "rightLowerLeg"],
        rightthigh: ["rightThigh"],
        rthigh: ["rightThigh"],
        rightlowerleg: ["rightLowerLeg"],
        rlowerleg: ["rightLowerLeg"],
        rightfoot: ["rightFoot"],
        rfoot: ["rightFoot"]
      };

      return aliases[normalized] || [];
    }

    function getConditionInput(names) {
      const raw = getText(names, "");
      if (!raw) return { active: false, zones: [] };

      const normalized = raw.trim().toLowerCase();

      if (["1", "true", "yes", "ja", "on", "active"].includes(normalized)) {
        return { active: true, zones: [] };
      }

      if (["0", "false", "no", "nein", "off", "inactive"].includes(normalized)) {
        return { active: false, zones: [] };
      }

      const zones = raw
        .split(/[;,|]/)
        .flatMap(part => part.split(","))
        .flatMap(part => expandZoneToken(part))
        .filter(Boolean);

      return {
        active: zones.length > 0,
        zones: [...new Set(zones)]
      };
    }

    function toZoneId(zoneKey) {
      return zoneKey.startsWith("zone-") ? zoneKey : `zone-${zoneKey}`;
    }

    function getZoneCenter(zoneKey) {
      const el = document.getElementById(toZoneId(zoneKey));
      if (!el) return null;

      const box = el.getBBox();
      return {
        x: box.x + box.width / 2,
        y: box.y + box.height / 2
      };
    }

    function getMarkerOffset(zoneKey) {
      const offsets = {
        head:           { dx: 42, dy: -18 },
        chest:          { dx: 60, dy: -16 },
        abdomen:        { dx: 64, dy: -2 },
        pelvis:         { dx: 60, dy: 10 },

        leftUpperArm:   { dx: -70, dy: -10 },
        leftForearm:    { dx: -78, dy: 8 },
        leftHand:       { dx: -56, dy: 0 },

        rightUpperArm:  { dx: 70, dy: -10 },
        rightForearm:   { dx: 78, dy: 8 },
        rightHand:      { dx: 56, dy: 0 },

        leftThigh:      { dx: -58, dy: 6 },
        leftLowerLeg:   { dx: -58, dy: 12 },
        leftFoot:       { dx: -44, dy: 0 },

        rightThigh:     { dx: 58, dy: 6 },
        rightLowerLeg:  { dx: 58, dy: 12 },
        rightFoot:      { dx: 44, dy: 0 }
      };

      return offsets[zoneKey] || { dx: 42, dy: 0 };
    }

    function addStatusMarker(zoneKey, code, type) {
      const center = getZoneCenter(zoneKey);
      if (!center) return;

      const { dx, dy } = getMarkerOffset(zoneKey);
      const tx = center.x + dx;
      const ty = center.y + dy;

      const layer = document.getElementById("statusMarkers");

      const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
      group.setAttribute("class", "status-marker");
      group.setAttribute("data-type", type);

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", center.x);
      line.setAttribute("y1", center.y);
      line.setAttribute("x2", tx);
      line.setAttribute("y2", ty);

      const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      dot.setAttribute("class", "status-marker-dot");
      dot.setAttribute("cx", center.x);
      dot.setAttribute("cy", center.y);
      dot.setAttribute("r", "3.2");

      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("class", "status-marker-tag");
      rect.setAttribute("x", tx - 18);
      rect.setAttribute("y", ty - 11);
      rect.setAttribute("width", "36");
      rect.setAttribute("height", "22");
      rect.setAttribute("rx", "6");

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("class", "status-marker-text");
      text.setAttribute("x", tx);
      text.setAttribute("y", ty + 4);
      text.setAttribute("text-anchor", "middle");
      text.textContent = code;

      group.appendChild(line);
      group.appendChild(dot);
      group.appendChild(rect);
      group.appendChild(text);
      layer.appendChild(group);
    }

    const legacyLeftArm = getNumber(["leftarm", "larm"], 0);
    const legacyRightArm = getNumber(["rightarm", "rarm"], 0);
    const legacyLeftLeg = getNumber(["leftleg", "lleg"], 0);
    const legacyRightLeg = getNumber(["rightleg", "rleg"], 0);

    const stats = {
      name: getText("name", "Ryo"),
      level: getText("level", "???"),
      species: getText(["species", "spezies"], "Mensch (nicht bestätigt)"),

      hp: getNumber("hp", 34),
      hpMax: getNumber(["hpmax", "hpMax"], 34),

      mana: getNumber("mana", 0),
      manaMax: getNumber(["manamax", "manaMax"], 0),

      stamina: getNumber(["ausdauer", "stamina"], 90),
      sync: getNumber(["sync", "synchronisation"], 20),

      str: getNumber("str", 16),
      dex: getNumber("dex", 10),
      con: getNumber("con", 16),
      int: getNumber("int", 9),
      wis: getNumber("wis", 16),
      cha: getNumber("cha", 20),

      injuries: {
        head: getNumber("head", 0),
        chest: getNumber("chest", 0),
        abdomen: getNumber("abdomen", 0),
        pelvis: getNumber("pelvis", 0),

        leftUpperArm: getNumber(["leftupperarm", "luparm"], legacyLeftArm),
        leftForearm: getNumber(["leftforearm", "lforearm"], legacyLeftArm),
        leftHand: getNumber(["lefthand", "lhand"], 0),

        rightUpperArm: getNumber(["rightupperarm", "ruparm"], legacyRightArm),
        rightForearm: getNumber(["rightforearm", "rforearm"], legacyRightArm),
        rightHand: getNumber(["righthand", "rhand"], 0),

        leftThigh: getNumber(["leftthigh", "lthigh"], legacyLeftLeg),
        leftLowerLeg: getNumber(["leftlowerleg", "llowerleg"], legacyLeftLeg),
        leftFoot: getNumber(["leftfoot", "lfoot"], 0),

        rightThigh: getNumber(["rightthigh", "rthigh"], legacyRightLeg),
        rightLowerLeg: getNumber(["rightlowerleg", "rlowerleg"], legacyRightLeg),
        rightFoot: getNumber(["rightfoot", "rfoot"], 0)
      },

      conditions: {
        bleeding: getConditionInput(["bleeding", "blutung"]),
        poisoned: getConditionInput(["poisoned", "vergiftet", "toxin"]),
        burning: getConditionInput(["burning", "verbrannt", "brand"]),
        fractured: getConditionInput(["fractured", "bruch", "fraktur"]),
        frostbite: getConditionInput(["frostbite", "frost", "erfrierung", "erfroren"]),
        necrosis: getConditionInput(["necrosis", "nekrose", "verderbnis"])
      }
    };

    document.getElementById("characterName").textContent = stats.name;
    document.getElementById("characterLevel").textContent = stats.level;
    document.getElementById("characterSpecies").textContent = stats.species;
    document.getElementById("syncLink").href = links.sync;

    const hpPercent = percent(stats.hp, stats.hpMax);
    const manaPercent = percent(stats.mana, stats.manaMax);
    const staminaPercent = clamp(stats.stamina, 0, 100);
    const syncPercent = clamp(stats.sync, 0, 100);

    const rings = [
      {
        label: "HP",
        valueText: `${stats.hp}/${stats.hpMax}`,
        subText: `${Math.round(hpPercent)}%`,
        percent: hpPercent,
        color: getHpColor(hpPercent),
        link: links.hp,
        speed: 4.4,
        delay: -0.6,
        pulseDelay: -0.2
      },
      {
        label: "Mana",
        valueText: stats.manaMax > 0 ? `${stats.mana}/${stats.manaMax}` : "—",
        subText: stats.manaMax > 0 ? `${Math.round(manaPercent)}%` : "Nicht erwacht",
        percent: manaPercent,
        color: "var(--mana-color)",
        link: links.mana,
        speed: 5.2,
        delay: -1.8,
        pulseDelay: -1.1
      },
      {
        label: "Ausdauer",
        valueText: getStaminaStage(staminaPercent),
        subText: `${Math.round(staminaPercent)}%`,
        percent: staminaPercent,
        color: "var(--stamina-color)",
        link: links.stamina,
        speed: 4.8,
        delay: -2.6,
        pulseDelay: -0.7
      }
    ];

    const attributes = [
      { name: "STR", value: stats.str, link: links.str },
      { name: "DEX", value: stats.dex, link: links.dex },
      { name: "CON", value: stats.con, link: links.con },
      { name: "INT", value: stats.int, link: links.int },
      { name: "WIS", value: stats.wis, link: links.wis },
      { name: "CHA", value: stats.cha, link: links.cha }
    ];

    const conditionConfig = [
      { key: "bleeding",  label: "Blutung",     code: "BLD" },
      { key: "poisoned",  label: "Vergiftung",  code: "TOX" },
      { key: "burning",   label: "Verbrennung", code: "BRN" },
      { key: "fractured", label: "Fraktur",     code: "FRX" },
      { key: "frostbite", label: "Erfrierung",  code: "FRS" },
      { key: "necrosis",  label: "Nekrose",     code: "NEC" }
    ];

    const ringsContainer = document.getElementById("rings");

    rings.forEach(ring => {
      const card = document.createElement("a");
      card.href = ring.link;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.className = "ring-card";
      card.style.setProperty("--ring-color", ring.color);
      card.style.setProperty("--angle", `${ring.percent * 3.6}deg`);
      card.style.setProperty("--sweep-speed", `${ring.speed}s`);
      card.style.setProperty("--sweep-delay", `${ring.delay}s`);
      card.style.setProperty("--pulse-delay", `${ring.pulseDelay}s`);

      card.innerHTML = `
        <div class="ring-label">${ring.label}</div>
        <div class="ring">
          <div class="ring-content">
            <div class="ring-value">${ring.valueText}</div>
            <div class="ring-sub">${ring.subText}</div>
          </div>
        </div>
      `;

      ringsContainer.appendChild(card);
    });

    const attributesContainer = document.getElementById("attributes");

    attributes.forEach(attribute => {
      const cell = document.createElement("a");
      cell.href = attribute.link;
      cell.target = "_blank";
      cell.rel = "noopener noreferrer";
      cell.className = "attribute";

      cell.innerHTML = `
        <div class="attr-name">${attribute.name}</div>
        <div class="attr-value">${attribute.value}</div>
      `;

      attributesContainer.appendChild(cell);
    });

    const conditionGrid = document.getElementById("conditionGrid");

    conditionConfig.forEach(condition => {
      const chip = document.createElement("div");
      const state = stats.conditions[condition.key];
      const active = state.active;

      chip.className = `condition-chip${active ? " active" : ""}`;
      chip.dataset.type = condition.key;
      chip.innerHTML = `
        <span class="condition-icon">${condition.code}</span>
        <span>${condition.label}</span>
      `;

      conditionGrid.appendChild(chip);

      if (active && state.zones.length > 0) {
        state.zones.forEach(zoneKey => {
          addStatusMarker(zoneKey, condition.code, condition.key);
        });
      }
    });

    const activeConditionCount = Object.values(stats.conditions)
      .filter(condition => condition.active).length;

    document.getElementById("bodyStatusLabel").textContent =
      activeConditionCount > 0
        ? `${activeConditionCount} Status aktiv`
        : "Stabil";

    Object.entries(stats.injuries).forEach(([zoneKey, level]) => {
      applyInjury(`zone-${zoneKey}`, level);
    });

    document.getElementById("syncText").textContent = `${Math.round(syncPercent)}%`;
    document.getElementById("syncFill").style.setProperty("--sync", `${syncPercent}%`);
  </script>
</body>
</html>
